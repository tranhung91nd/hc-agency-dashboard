body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--tx1);min-height:100vh;}
.app{display:grid;grid-template-columns:180px 1fr;min-height:100vh;}

.nav-item:hover{background:var(--bd1);color:var(--tx1);}.nav-item.active{background:var(--blue-bg);color:var(--blue-tx);font-weight:500;border-left-color:var(--blue);}

.section-title{font-size:14px;font-weight:600;margin:20px 0 8px;}.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:500px;}th{text-align:left;padding:8px 10px;font-size:11px;font-weight:500;color:var(--tx3);border-bottom:1px solid var(--bd2);text-transform:uppercase;letter-spacing:.3px;}td{padding:8px 10px;border-bottom:1px solid var(--bd1);font-size:13px;}tr:hover td{background:var(--bg2);}
.mono{font-variant-numeric:tabular-nums;font-size:13px;letter-spacing:-0.01em;}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500;}.b-green{background:var(--green-bg);color:var(--green-tx);}.b-red{background:var(--red-bg);color:var(--red-tx);}.b-amber{background:var(--amber-bg);color:var(--amber-tx);}.b-blue{background:var(--blue-bg);color:var(--blue-tx);}.b-purple{background:var(--purple-bg);color:var(--purple-tx);}.b-coral{background:var(--coral-bg);color:var(--coral-tx);}.b-pink{background:var(--pink-bg);color:var(--pink-tx);}.b-gray{background:var(--bg3);color:var(--tx3);}

.form-group input,.form-group select{padding:8px 10px;border:1px solid var(--bd2);border-radius:var(--radius);background:var(--bg2);color:var(--tx1);font-size:13px;font-family:inherit;outline:none;transition:border .15s;}.form-group input:focus,.form-group select:focus{border-color:var(--blue);}
.btn{padding:8px 16px;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;}.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--blue);color:#fff;}.btn-primary:hover:not(:disabled){opacity:.9;}.btn-red{background:var(--red);color:#fff;}.btn-red:hover:not(:disabled){opacity:.9;}.btn-green{background:var(--green);color:#fff;}.btn-green:hover:not(:disabled){opacity:.9;}.btn-ghost{background:transparent;color:var(--tx2);border:1px solid var(--bd2);}.btn-ghost:hover{background:var(--bg2);}.btn-sm{padding:4px 10px;font-size:11px;}
.btn-row{display:flex;gap:8px;margin-top:12px;}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:999;animation:slideIn .3s;box-shadow:0 4px 12px rgba(0,0,0,.15);}.toast-ok{background:var(--green);color:#fff;}.toast-err{background:var(--red);color:#fff;}@keyframes slideIn{from{transform:translateX(100px);opacity:0;}to{transform:translateX(0);opacity:1;}}

.bulk-row{display:grid;grid-template-columns:1fr 2fr 140px;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd1);}.bulk-row:last-child{border-bottom:none;}.bulk-row input{padding:6px 8px;border:1px solid var(--bd2);border-radius:var(--radius);background:var(--bg2);color:var(--tx1);font-size:13px;font-variant-numeric:tabular-nums;text-align:right;width:100%;}.bulk-row input:focus{border-color:var(--blue);outline:none;}.bulk-label{font-size:12px;color:var(--tx2);}.bulk-sub{font-size:11px;color:var(--tx3);}

.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0;}.dot-ok{background:var(--green);}.dot-off{background:var(--red);}.dot-warn{background:var(--amber);}
.st-text{display:inline-flex;align-items:center;font-size:12px;white-space:nowrap;}
.tk-name{font-weight:600;font-size:13px;cursor:pointer;transition:color .15s;}.tk-name:hover{color:var(--blue);}
.tk-id{font-size:10px;color:var(--tx3);font-variant-numeric:tabular-nums;margin-top:1px;}
.nv-cell{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:3px 5px;border-radius:6px;margin:-3px -5px;transition:background .1s;}.nv-cell:hover{background:var(--bg2);}
.kh-cell{font-size:12px;color:var(--tx2);cursor:pointer;padding:3px 5px;border-radius:6px;margin:-3px -5px;transition:background .1s;}.kh-cell:hover{background:var(--bg2);}
.edit-hint{font-size:10px;color:var(--tx3);opacity:0;transition:opacity .15s;margin-left:3px;}.nv-cell:hover .edit-hint,.kh-cell:hover .edit-hint{opacity:1;}
.nv-badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:8px;}
.spend-num{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--teal);text-align:right;}
.spend-bar{height:3px;border-radius:2px;background:var(--bd1);margin-top:4px;width:100%;max-width:120px;margin-left:auto;}.spend-fill{height:3px;border-radius:2px;background:var(--green);}

.pq{font-size:11px;padding:3px 10px;border-radius:12px;cursor:pointer;display:inline-block;}.pq-r{background:var(--bg3);color:var(--tx3);}.pq-s{background:var(--purple-bg);color:var(--purple-tx);}
.shared-row{background:rgba(83,74,183,0.02);}
.sort-arrow{font-size:10px;margin-left:3px;opacity:.25;}.sort-arrow.on{opacity:1;color:var(--teal);}
.foot-row td{background:var(--bg2);font-weight:600;border-top:1px solid var(--bd2);}
@media(max-width:768px){.sum-grid{grid-template-columns:1fr 1fr;}}
.login-box{max-width:360px;margin:60px auto;background:var(--bg1);border:1px solid var(--bd1);border-radius:var(--radius-lg);padding:32px;}
.login-box h2{font-size:18px;font-weight:600;margin-bottom:4px;}.login-box p{font-size:13px;color:var(--tx3);margin-bottom:20px;}
.login-box .form-group{margin-bottom:12px;}.login-box .btn{width:100%;margin-top:8px;}

.logout-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--green-bg);color:var(--green-tx);border-radius:var(--radius);margin-bottom:16px;font-size:13px;}
</style>

// ═══ META SYNC ═══
async function doMetaSync2(btn){
var date=adViewDate;if(!date){toast('Chọn ngày',false);return;}
btn.disabled=true;btn.textContent='Đang đồng bộ...';
var mapped=adList.filter(function(a){return a.fb_account_id;});
if(!mapped.length){toast('Chưa có TK nào ghép Meta',false);btn.disabled=false;btn.textContent='Đồng bộ ngày '+fd(date);return;}
var normal=mapped.filter(function(a){return!a.is_shared;});
var shared=mapped.filter(function(a){return a.is_shared;});
var saved=0,errors=0;
// === BATCH API: 50 TK thường / lần gọi ===
for(var b=0;b<normal.length;b+=50){
var chunk=normal.slice(b,b+50);
var batchReqs=chunk.map(function(a){return{method:'GET',relative_url:a.fb_account_id+'/insights?fields=spend&time_range={"since":"'+date+'","until":"'+date+'"}'};});
try{
var bResp=await fetch('https://graph.facebook.com/v25.0/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'batch='+encodeURIComponent(JSON.stringify(batchReqs))+'&access_token='+META_TOKEN+'&include_headers=false'});
var bResults=await bResp.json();
// Song song 10 lưu DB cùng lúc
var tasks=[];
for(var j=0;j<bResults.length;j++){(function(idx){
tasks.push((async function(){try{
var body=JSON.parse(bResults[idx].body||'{}');
var spend=0;if(body.data&&body.data.length)spend=Math.round(parseFloat(body.data[0].spend));
await sb2.from('daily_spend').delete().eq('ad_account_id',chunk[idx].id).eq('report_date',date).is('staff_id',null);
var r=await sb2.from('daily_spend').insert({ad_account_id:chunk[idx].id,report_date:date,spend_amount:spend});
if(!r.error)saved++;else errors++;
}catch(e){errors++;}})());
})(j);
if(tasks.length>=10||j===bResults.length-1){await Promise.all(tasks);tasks=[];}}
}catch(e){errors+=chunk.length;}}
// === TK dùng chung: song song 5 TK ===
var sFns=shared.map(function(a){return async function(){try{
var url='https://graph.facebook.com/v25.0/'+a.fb_account_id+'/insights?level=campaign&fields=campaign_name,spend&time_range={"since":"'+date+'","until":"'+date+'"}&limit=500&access_token='+META_TOKEN;
var resp=await fetch(url);var data=await resp.json();
if(data.error){errors++;return;}
await sb2.from('daily_spend').delete().eq('ad_account_id',a.id).eq('report_date',date).not('staff_id','is',null);
var combo={};
(data.data||[]).forEach(function(c){var spend=Math.round(parseFloat(c.spend||0));if(!spend)return;
var parts=(c.campaign_name||'').split('_');var sp=(parts[0]||'').trim();var cp=(parts[2]||'').trim();
var ms2=allStaff.find(function(s){return s.campaign_keyword&&sp.toLowerCase()===s.campaign_keyword.toLowerCase();});
var mc=clientList.find(function(cl){return cl.campaign_keyword&&cp.toLowerCase().indexOf(cl.campaign_keyword.toLowerCase())>=0;});
if(ms2){var key=ms2.id+'|'+(mc?mc.id:'');if(!combo[key])combo[key]={sid:ms2.id,cid:mc?mc.id:null,spend:0};combo[key].spend+=spend;}});
var ks=Object.keys(combo);
for(var k=0;k<ks.length;k++){var cb=combo[ks[k]];
var r=await sb2.from('daily_spend').insert({ad_account_id:a.id,report_date:date,spend_amount:cb.spend,staff_id:cb.sid,matched_client_id:cb.cid});
if(!r.error)saved++;else errors++;}
}catch(e){errors++;}};});
for(var si=0;si<sFns.length;si+=5){await Promise.all(sFns.slice(si,si+5).map(function(fn){return fn();}));}
btn.disabled=false;btn.textContent='Đồng bộ ngày '+fd(date);
toast('Đồng bộ xong: '+saved+' OK'+(errors?', '+errors+' lỗi':''),!errors);
await loadAll();pg(5);}
async function loadMetaAccounts(force){if(!force&&metaAccounts.length)return;try{var all=[];var url='https://graph.facebook.com/v25.0/me/adaccounts?fields=id,name,account_status&limit=100&access_token='+META_TOKEN;while(url){var resp=await fetch(url);var data=await resp.json();if(data.error){toast('Meta API lỗi: '+data.error.message,false);return;}all=all.concat(data.data||[]);url=data.paging&&data.paging.next?data.paging.next:null;}metaAccounts=all;}catch(e){toast('Lỗi: '+e.message,false);}}
async function loadMetaAndSync(){
await loadMetaAccounts(true);if(!metaAccounts.length)return;
await loadAll();
var seen=new Set();var uniqueMeta=metaAccounts.filter(function(m){if(seen.has(m.id))return false;seen.add(m.id);return true;});
var existFb=new Set();adList.forEach(function(a){if(a.fb_account_id)existFb.add(a.fb_account_id);});
var ph=clientList.find(function(c){return c.name==='Chưa phân loại';});var phId;
if(ph){phId=ph.id;}else{var{data:nc,error}=await sb2.from('client').insert({name:'Chưa phân loại',status:'active'}).select('id').single();if(error){toast('Lỗi',false);return;}phId=nc.id;}
var imp=0;
for(var i=0;i<uniqueMeta.length;i++){var m=uniqueMeta[i];if(existFb.has(m.id))continue;existFb.add(m.id);
await sb2.from('ad_account').insert({client_id:phId,account_name:m.name,fb_account_id:m.id,account_status:m.account_status});imp++;}
for(var j=0;j<uniqueMeta.length;j++){var m2=uniqueMeta[j];
await sb2.from('ad_account').update({account_status:m2.account_status}).eq('fb_account_id',m2.id);}
toast(imp?'Nhập '+imp+' TK mới + cập nhật trạng thái':'Cập nhật trạng thái xong',true);
await loadAll();pg(5);}

function a5(){
var h='<div class="form-card"><h3>Nhập lương</h3><div class="form-row"><div class="form-group"><label>Tháng</label><input type="month" id="slm" value="'+gm()+'"></div><div class="form-group"><label>Nhân sự</label><select id="sls">';staffList.forEach(function(s){h+='<option value="'+s.id+'">'+s.short_name+'</option>';});h+='</select></div><div class="form-group"><label>Lương CB</label><input type="number" id="slb" placeholder="0"></div></div>';
h+='<div class="form-row"><div class="form-group"><label>Thưởng</label><input type="number" id="slx" placeholder="0" value="0"></div><div class="form-group"><label>Ghi chú</label><input type="text" id="sln" placeholder=""></div></div><div class="btn-row"><button class="btn btn-primary" onclick="svsl(this)">Lưu</button></div></div>';
h+='<div class="section-title">Lịch sử lương</div><div class="table-wrap"><table><tr><th>Tháng</th><th>NV</th><th style="text-align:right;">Lương CB</th><th style="text-align:right;">Thưởng</th><th style="text-align:right;">Tổng</th><th></th></tr>';
salaryData.slice(0,20).forEach(function(s){h+='<tr><td>T'+parseInt(s.month.split('-')[1])+'/'+s.month.split('-')[0]+'</td><td>'+(s.staff?s.staff.short_name:'—')+'</td><td class="mono" style="text-align:right;">'+ff(s.base_salary)+'</td><td class="mono" style="text-align:right;">'+ff(s.bonus)+'</td><td class="mono" style="text-align:right;font-weight:500;">'+ff(s.total)+'</td><td><button class="btn btn-red btn-sm" onclick="dlsl(this,\''+s.id+'\')">Xóa</button></td></tr>';});
h+='</table></div>';return h;}
async function svsl(btn){btn.disabled=true;var m=document.getElementById('slm').value,si=document.getElementById('sls').value,b=parseInt(document.getElementById('slb').value)||0,x=parseInt(document.getElementById('slx').value)||0,n=document.getElementById('sln').value;if(!b){toast('Nhập lương',false);btn.disabled=false;return;}var r=await sb2.from('salary').upsert({staff_id:si,month:m,base_salary:b,bonus:x,total:b+x,note:n},{onConflict:'staff_id,month'});btn.disabled=false;if(r.error)toast('Lỗi: '+r.error.message,false);else{toast('Đã lưu!',true);document.getElementById('slb').value='';document.getElementById('slx').value='0';document.getElementById('sln').value='';await loadAll();pg(5);}}
async function dlsl(btn,id){if(!confirm('Xóa?'))return;btn.disabled=true;var r=await sb2.from('salary').delete().eq('id',id);if(r.error){toast('Lỗi',false);btn.disabled=false;}else{toast('Đã xóa!',true);await loadAll();pg(5);}}

async function init(){await checkAuth();await loadAll();}
init();
</script>
</body>
</html>
