<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg1:#ffffff;--bg2:#f5f4f0;--bg3:#eeedeb;--tx1:#1a1a1a;--tx2:#6b6a66;--tx3:#9c9a92;--bd1:rgba(0,0,0,0.08);--bd2:rgba(0,0,0,0.15);--green:#1D9E75;--green-bg:#E1F5EE;--green-tx:#085041;--red:#E24B4A;--red-bg:#FCEBEB;--red-tx:#791F1F;--amber:#BA7517;--amber-bg:#FAEEDA;--amber-tx:#633806;--blue:#378ADD;--blue-bg:#E6F1FB;--blue-tx:#0C447C;--purple:#534AB7;--purple-bg:#EEEDFE;--purple-tx:#3C3489;--coral:#D85A30;--coral-bg:#FAECE7;--coral-tx:#712B13;--pink:#D4537E;--pink-bg:#FBEAF0;--pink-tx:#72243E;--teal:#0F6E56;--teal-bg:#E1F5EE;--teal-tx:#085041;--radius:8px;--radius-lg:12px;}
@media(prefers-color-scheme:dark){:root{--bg1:#1a1a1a;--bg2:#252523;--bg3:#2f2f2c;--tx1:#e8e6df;--tx2:#9c9a92;--tx3:#6b6a66;--bd1:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.15);--green-bg:#04342C;--green-tx:#9FE1CB;--red-bg:#501313;--red-tx:#F7C1C1;--amber-bg:#412402;--amber-tx:#FAC775;--blue-bg:#042C53;--blue-tx:#B5D4F4;--purple-bg:#26215C;--purple-tx:#CECBF6;--coral-bg:#4A1B0C;--coral-tx:#F5C4B3;--pink-bg:#4B1528;--pink-tx:#F4C0D1;--teal-bg:#04342C;--teal-tx:#9FE1CB;}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--tx1);min-height:100vh;}
.app{display:grid;grid-template-columns:180px 1fr;min-height:100vh;}
@media(max-width:768px){.app{grid-template-columns:1fr;}.sidebar{transform:translateX(-100%);position:fixed;z-index:100;width:220px;}.sidebar.open{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,.2);}}

.logo{padding:8px 20px 20px;border-bottom:1px solid var(--bd1);margin-bottom:8px;}.logo h1{font-size:18px;font-weight:600;}.logo span{font-size:11px;color:var(--tx3);}
.logo .live{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:4px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:var(--tx2);cursor:pointer;transition:all .15s;border-left:3px solid transparent;}
.nav-item:hover{background:var(--bd1);color:var(--tx1);}.nav-item.active{background:var(--blue-bg);color:var(--blue-tx);font-weight:500;border-left-color:var(--blue);}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nav-sep{height:1px;background:var(--bd1);margin:8px 20px;}.nav-label{padding:8px 20px 4px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);}
.mobile-header{display:none;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--bd1);position:sticky;top:0;z-index:50;}

.hamburger{width:28px;height:28px;display:flex;flex-direction:column;justify-content:center;gap:4px;cursor:pointer;background:none;border:none;padding:4px;}.hamburger span{display:block;width:100%;height:2px;background:var(--tx1);border-radius:1px;}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:99;}.overlay.show{display:block;}
.main{padding:24px 28px;overflow-y:auto;}@media(max-width:768px){.main{padding:16px;}}
.page-title{font-size:20px;font-weight:600;margin-bottom:4px;}.page-sub{font-size:13px;color:var(--tx3);margin-bottom:16px;}
.kpi-grid{display:grid;gap:10px;margin-bottom:16px;}.kpi-4{grid-template-columns:repeat(4,1fr);}.kpi-3{grid-template-columns:repeat(3,1fr);}
@media(max-width:768px){.kpi-4,.kpi-3{grid-template-columns:repeat(2,1fr);}}
.kpi{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;}.kpi-label{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;}.kpi-value{font-size:22px;font-weight:600;margin-top:2px;}.kpi-note{font-size:11px;color:var(--tx3);margin-top:2px;}
.section-title{font-size:14px;font-weight:600;margin:20px 0 8px;}.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:500px;}th{text-align:left;padding:8px 10px;font-size:11px;font-weight:500;color:var(--tx3);border-bottom:1px solid var(--bd2);text-transform:uppercase;letter-spacing:.3px;}td{padding:8px 10px;border-bottom:1px solid var(--bd1);font-size:13px;}tr:hover td{background:var(--bg2);}
.mono{font-variant-numeric:tabular-nums;font-size:13px;letter-spacing:-0.01em;}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500;}.b-green{background:var(--green-bg);color:var(--green-tx);}.b-red{background:var(--red-bg);color:var(--red-tx);}.b-amber{background:var(--amber-bg);color:var(--amber-tx);}.b-blue{background:var(--blue-bg);color:var(--blue-tx);}.b-purple{background:var(--purple-bg);color:var(--purple-tx);}.b-coral{background:var(--coral-bg);color:var(--coral-tx);}.b-pink{background:var(--pink-bg);color:var(--pink-tx);}.b-gray{background:var(--bg3);color:var(--tx3);}
.bar-track{height:6px;border-radius:3px;background:var(--bd1);width:100%;}.bar-fill{height:6px;border-radius:3px;}
.avatar{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.staff-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;}@media(max-width:768px){.staff-cards{grid-template-columns:repeat(2,1fr);}}
.staff-card{background:var(--bg2);border-radius:var(--radius-lg);padding:12px 14px;cursor:pointer;border:2px solid transparent;transition:all .15s;}.staff-card:hover{border-color:var(--bd2);}.staff-card.active{border-color:var(--blue);background:var(--blue-bg);}
.staff-card-name{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;margin-bottom:4px;}.staff-card-value{font-size:20px;font-weight:600;margin-bottom:2px;}.staff-card-sub{font-size:11px;color:var(--tx3);}
.detail-panel{background:var(--bg1);border:1px solid var(--bd1);border-radius:var(--radius-lg);padding:16px;margin-top:10px;}
.kh-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd1);}.kh-row:last-child{border-bottom:none;}.kh-name{font-weight:500;font-size:13px;}.kh-tk{font-size:11px;color:var(--tx3);}.kh-val{font-variant-numeric:tabular-nums;font-size:13px;font-weight:600;}
.day-btns{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;}.day-btn{padding:6px 12px;font-size:12px;cursor:pointer;border-radius:var(--radius);border:1px solid var(--bd2);background:var(--bg1);color:var(--tx2);font-variant-numeric:tabular-nums;transition:all .12s;}.day-btn:hover{background:var(--bg2);}.day-btn.active{background:var(--blue-bg);color:var(--blue-tx);border-color:var(--blue);}
.total-bar{margin-top:12px;padding:12px 16px;background:var(--bg2);border-radius:var(--radius);display:flex;justify-content:space-between;align-items:center;font-size:14px;}.total-bar span:last-child{font-weight:600;font-size:18px;}
.loading{text-align:center;padding:40px;color:var(--tx3);font-size:14px;}.loading::after{content:'';display:inline-block;width:16px;height:16px;border:2px solid var(--bd2);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle;}@keyframes spin{to{transform:rotate(360deg);}}
.error-box{padding:16px;background:var(--red-bg);color:var(--red-tx);border-radius:var(--radius);margin:20px 0;font-size:13px;}
.admin-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;}.admin-tab{padding:8px 16px;font-size:13px;cursor:pointer;border-radius:var(--radius);border:1px solid var(--bd2);background:var(--bg1);color:var(--tx2);transition:all .12s;}.admin-tab:hover{background:var(--bg2);}.admin-tab.active{background:var(--blue-bg);color:var(--blue-tx);border-color:var(--blue);font-weight:500;}
.form-card{background:var(--bg1);border:1px solid var(--bd1);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;}.form-card h3{font-size:15px;font-weight:600;margin-bottom:12px;}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:10px;}.form-group{display:flex;flex-direction:column;gap:4px;}.form-group label{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;}
.form-group input,.form-group select{padding:8px 10px;border:1px solid var(--bd2);border-radius:var(--radius);background:var(--bg2);color:var(--tx1);font-size:13px;font-family:inherit;outline:none;transition:border .15s;}.form-group input:focus,.form-group select:focus{border-color:var(--blue);}
.btn{padding:8px 16px;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;}.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--blue);color:#fff;}.btn-primary:hover:not(:disabled){opacity:.9;}.btn-red{background:var(--red);color:#fff;}.btn-red:hover:not(:disabled){opacity:.9;}.btn-ghost{background:transparent;color:var(--tx2);border:1px solid var(--bd2);}.btn-ghost:hover{background:var(--bg2);}.btn-sm{padding:4px 10px;font-size:11px;}
.btn-row{display:flex;gap:8px;margin-top:12px;}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:999;animation:slideIn .3s;box-shadow:0 4px 12px rgba(0,0,0,.15);}.toast-ok{background:var(--green);color:#fff;}.toast-err{background:var(--red);color:#fff;}@keyframes slideIn{from{transform:translateX(100px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.tag-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:500;background:var(--bg3);color:var(--tx2);}.tag .x{cursor:pointer;font-size:13px;line-height:1;opacity:.6;}.tag .x:hover{opacity:1;}
.bulk-row{display:grid;grid-template-columns:1fr 2fr 140px;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd1);}.bulk-row:last-child{border-bottom:none;}.bulk-row input{padding:6px 8px;border:1px solid var(--bd2);border-radius:var(--radius);background:var(--bg2);color:var(--tx1);font-size:13px;font-variant-numeric:tabular-nums;text-align:right;width:100%;}.bulk-row input:focus{border-color:var(--blue);outline:none;}.bulk-label{font-size:12px;color:var(--tx2);}.bulk-sub{font-size:11px;color:var(--tx3);}
.month-filter{display:flex;gap:8px;align-items:center;margin-bottom:16px;}.month-filter select{padding:6px 10px;border:1px solid var(--bd2);border-radius:var(--radius);background:var(--bg1);color:var(--tx1);font-size:13px;}
.login-box{max-width:360px;margin:60px auto;background:var(--bg1);border:1px solid var(--bd1);border-radius:var(--radius-lg);padding:32px;}
.login-box h2{font-size:18px;font-weight:600;margin-bottom:4px;}.login-box p{font-size:13px;color:var(--tx3);margin-bottom:20px;}
.login-box .form-group{margin-bottom:12px;}.login-box .btn{width:100%;margin-top:8px;}
.login-err{color:var(--red);font-size:12px;margin-top:8px;}
.logout-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--green-bg);color:var(--green-tx);border-radius:var(--radius);margin-bottom:16px;font-size:13px;}
</style>
</head>
<body>
<div class="mobile-header"><button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button><span style="font-weight:600;font-size:15px;">HC Agency</span></div>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="app">

<script>
var SB_URL='https://eqsnohwymgmdvbqwflas.supabase.co',SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxc25vaHd5bWdtZHZicXdmbGFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzU1NzUsImV4cCI6MjA5MTIxMTU3NX0.0cv-j9zJUfVAj9LBG8VFHNO0Jke4JjehBKSzDVd1nA0';
var sb2=supabase.createClient(SB_URL,SB_KEY);
var CL={purple:{c:'var(--purple)',bg:'var(--purple-bg)',tx:'var(--purple-tx)'},teal:{c:'var(--teal)',bg:'var(--teal-bg)',tx:'var(--teal-tx)'},coral:{c:'var(--coral)',bg:'var(--coral-bg)',tx:'var(--coral-tx)'},pink:{c:'var(--pink)',bg:'var(--pink-bg)',tx:'var(--pink-tx)'},blue:{c:'var(--blue)',bg:'var(--blue-bg)',tx:'var(--blue-tx)'},green:{c:'var(--green)',bg:'var(--green-bg)',tx:'var(--green-tx)'},amber:{c:'var(--amber)',bg:'var(--amber-bg)',tx:'var(--amber-tx)'}};

var allStaff=[],staffList=[],clientList=[],adList=[],dailyData=[],salaryData=[],txnData=[],monthlyRevData=[],scData=[],saData=[],scMap={},saMap={};
var curPage=0,cDay=null,cStaff=null,dates=[],adminTab=0,finMonth='',authUser=null;
function fm(n){if(!n)return'—';if(n>=1e6)return(n/1e6).toFixed(1)+'tr';if(n>=1e3)return Math.round(n/1e3).toLocaleString('vi-VN')+'K';return n.toLocaleString('vi-VN');}

function td(){return new Date().toISOString().split('T')[0];}
function gm(){return td().substring(0,7);}
function lm(){return dates.length?dates[dates.length-1].substring(0,7):gm();}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
async function loadAll(){try{
var[s,c,aa,ds,sal,tx,mr,scl,saa]=await Promise.all([sb2.from('staff').select('*').order('monthly_budget',{ascending:false}),sb2.from('client').select('*').order('name'),sb2.from('ad_account').select('*,client(name)').order('account_name'),sb2.from('daily_spend').select('*,ad_account(id,account_name,client_id,client(name))').order('report_date'),sb2.from('salary').select('*,staff(short_name)').order('month',{ascending:false}),sb2.from('transaction').select('*,client(name),staff(short_name)').order('txn_date',{ascending:false}),sb2.from('monthly_revenue').select('*,staff(short_name,code)').order('month'),sb2.from('staff_client').select('*,client(name)'),sb2.from('staff_ad_account').select('*,ad_account(id,account_name,client_id)')]);
if(s.error)throw s.error;allStaff=s.data||[];staffList=allStaff.filter(function(x){return x.is_active;});clientList=c.data||[];adList=aa.data||[];dailyData=ds.data||[];salaryData=sal.data||[];txnData=tx.data||[];monthlyRevData=mr.data||[];scData=scl.data||[];saData=saa.data||[];

function gsfa(aid,date){var m=date.substring(0,7);var r=(saMap[aid]||[]).filter(function(x){return x.month===m;});return r.length?r[0].staff_id:null;}
function gdbs(date){var r={};staffList.forEach(function(s){r[s.id]={s:s,t:0,cl:[]};});dailyData.filter(function(d){return d.report_date===date;}).forEach(function(d){var sid=gsfa(d.ad_account_id,date);if(sid&&r[sid]){r[sid].t+=d.spend_amount;r[sid].cl.push({n:d.ad_account&&d.ad_account.client?d.ad_account.client.name:'—',a:d.ad_account?d.ad_account.account_name:'—',v:d.spend_amount});}});return r;}
function pg(i){curPage=i;cStaff=null;document.querySelectorAll('.nav-item[data-page]').forEach(function(n){n.classList.toggle('active',parseInt(n.dataset.page)===i);});if(window.innerWidth<=768){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}render();}
function render(){var el=document.getElementById('page');if(curPage===0)el.innerHTML=p0();else if(curPage===1){el.innerHTML=p1();bindD();}else if(curPage===2)el.innerHTML=p2();else if(curPage===3)el.innerHTML=p3();else if(curPage===4)el.innerHTML=p4();else if(curPage===5)el.innerHTML=p5();}
// P0: TỔNG QUAN
function p0(){var tot=0,st={};staffList.forEach(function(s){st[s.id]=0;});dailyData.forEach(function(d){var sid=gsfa(d.ad_account_id,d.report_date);if(sid){st[sid]+=d.spend_amount;tot+=d.spend_amount;}});var cm=lm(),inc=0,exp=0;txnData.forEach(function(t){if(t.month===cm){if(t.txn_type==='income')inc+=t.amount;else exp+=t.amount;}});var pr=inc-exp,mg=inc>0?Math.round(pr/inc*100):0,nd=dates.length||1;

function a2(){var cm=gm();var h='<div class="form-card"><h3>Phân công NV ↔ KH</h3><div class="form-row"><div class="form-group"><label>Tháng</label><input type="month" id="am" value="'+cm+'"></div><div class="form-group"><label>Nhân sự</label><select id="as">';staffList.forEach(function(s){h+='<option value="'+s.id+'">'+s.short_name+'</option>';});h+='</select></div><div class="form-group"><label>KH</label><select id="ak">';clientList.forEach(function(c2){h+='<option value="'+c2.id+'">'+c2.name+'</option>';});h+='</select></div></div><div class="btn-row"><button class="btn btn-primary" onclick="sva(this)">Phân công</button></div></div>';
h+='<div class="form-card"><h3>Gán TK QC cho NV</h3><div class="form-row"><div class="form-group"><label>Tháng</label><input type="month" id="am2" value="'+cm+'"></div><div class="form-group"><label>Nhân sự</label><select id="as2">';staffList.forEach(function(s){h+='<option value="'+s.id+'">'+s.short_name+'</option>';});h+='</select></div><div class="form-group"><label>TK QC</label><select id="aa2">';adList.forEach(function(a){h+='<option value="'+a.id+'">'+a.account_name+(a.client?' ('+a.client.name+')':'')+'</option>';});h+='</select></div></div><div class="btn-row"><button class="btn btn-primary" onclick="svaa(this)">Gán TK</button></div></div>';
h+='<div class="form-card"><h3>Thêm TK quảng cáo</h3><div class="form-row"><div class="form-group"><label>KH</label><select id="aac">';clientList.forEach(function(c2){h+='<option value="'+c2.id+'">'+c2.name+'</option>';});h+='</select></div><div class="form-group"><label>Tên TK</label><input type="text" id="aan" placeholder="Fitness 02"></div><div class="form-group"><label>FB ID</label><input type="text" id="aaf" placeholder="act_123"></div></div><div class="btn-row"><button class="btn btn-primary" onclick="svad(this)">Thêm TK</button></div></div>';
h+='<div class="section-title">Phân công tháng '+parseInt(cm.split('-')[1])+'/'+cm.split('-')[0]+'</div>';
staffList.forEach(function(s){var c=sc(s.color_code),cl=(scMap[s.id]&&scMap[s.id][cm])||[],ads=saData.filter(function(a){return a.staff_id===s.id&&a.month===cm;});h+='<div style="margin:12px 0 4px;display:flex;align-items:center;gap:6px;"><div class="avatar" style="background:'+c.bg+';color:'+c.tx+';width:24px;height:24px;font-size:10px;">'+s.avatar_initials+'</div><span style="font-weight:600;font-size:13px;">'+s.short_name+'</span></div>';
h+='<div style="font-size:11px;color:var(--tx3);">KH:</div><div class="tag-list">';cl.forEach(function(x){h+='<span class="tag" style="background:'+c.bg+';color:'+c.tx+';">'+(x.client?x.client.name:'—')+' <span class="x" onclick="rma(this,\''+x.id+'\')">&times;</span></span>';});if(!cl.length)h+='<span style="font-size:12px;color:var(--tx3);">—</span>';h+='</div>';
h+='<div style="font-size:11px;color:var(--tx3);margin-top:4px;">TK:</div><div class="tag-list">';ads.forEach(function(a){h+='<span class="tag">'+(a.ad_account?a.ad_account.account_name:'—')+' <span class="x" onclick="rmaa(this,\''+a.id+'\')">&times;</span></span>';});if(!ads.length)h+='<span style="font-size:12px;color:var(--tx3);">—</span>';h+='</div>';});return h;}
async function sva(btn){btn.disabled=true;var d={staff_id:document.getElementById('as').value,client_id:document.getElementById('ak').value,month:document.getElementById('am').value};var r=await sb2.from('staff_client').upsert(d,{onConflict:'staff_id,client_id,month'});btn.disabled=false;if(r.error)toast('Lỗi: '+r.error.message,false);else{toast('OK!',true);await loadAll();pg(5);}}

// A3: THU CHI
function a3(){var h='<div class="form-card"><h3>Thêm giao dịch</h3><div class="form-row"><div class="form-group"><label>Ngày</label><input type="date" id="td2" value="'+td()+'"></div><div class="form-group"><label>Loại</label><select id="tt"><option value="income">Thu</option><option value="expense">Chi</option></select></div><div class="form-group"><label>Số tiền</label><input type="number" id="tv" placeholder="0"></div></div><div class="form-row"><div class="form-group"><label>Phân loại</label><select id="tc"><option value="service_fee">Phí DV</option><option value="salary">Lương</option><option value="rent">Mặt bằng</option><option value="other">Khác</option></select></div><div class="form-group"><label>KH</label><select id="tk"><option value="">—</option>';clientList.forEach(function(c2){h+='<option value="'+c2.id+'">'+c2.name+'</option>';});h+='</select></div><div class="form-group"><label>NV</label><select id="tn"><option value="">—</option>';staffList.forEach(function(s){h+='<option value="'+s.id+'">'+s.short_name+'</option>';});h+='</select></div></div><div class="form-row"><div class="form-group" style="grid-column:1/-1;"><label>Ghi chú</label><input type="text" id="tno" placeholder=""></div></div><div class="btn-row"><button class="btn btn-primary" onclick="svt(this)">Lưu</button></div></div>';
var cm2={service_fee:'Phí DV',salary:'Lương',rent:'Mặt bằng',other:'Khác'};h+='<div class="section-title">Gần đây</div><div class="table-wrap"><table><tr><th>Ngày</th><th>Loại</th><th>KH/NV</th><th style="text-align:right;">Số tiền</th><th></th></tr>';txnData.slice(0,20).forEach(function(t){var nm=t.client?t.client.name:(t.staff?t.staff.short_name:(t.note||'—'));h+='<tr><td>'+fd(t.txn_date)+'</td><td><span class="badge '+(t.txn_type==='income'?'b-green':'b-red')+'">'+(t.txn_type==='income'?'Thu':'Chi')+'</span></td><td>'+nm+'</td><td class="mono" style="text-align:right;color:'+(t.txn_type==='income'?'var(--green)':'var(--red)')+';font-weight:500;">'+(t.txn_type==='income'?'+':'-')+ff(t.amount)+'</td><td><button class="btn btn-red btn-sm" onclick="dlt(this,\''+t.id+'\')">Xóa</button></td></tr>';});h+='</table></div>';return h;}
async function svt(btn){btn.disabled=true;var d=document.getElementById('td2').value,tp=document.getElementById('tt').value,v=parseInt(document.getElementById('tv').value)||0,cat=document.getElementById('tc').value,ci=document.getElementById('tk').value||null,si=document.getElementById('tn').value||null,no=document.getElementById('tno').value;if(!v){toast('Nhập số tiền',false);btn.disabled=false;return;}var r=await sb2.from('transaction').insert({txn_date:d,txn_type:tp,amount:v,category:cat,client_id:ci,staff_id:si,note:no,month:d.substring(0,7)});btn.disabled=false;if(r.error)toast('Lỗi: '+r.error.message,false);else{toast('Đã lưu!',true);document.getElementById('tv').value='';document.getElementById('tno').value='';await loadAll();pg(5);}}
async function dlt(btn,id){if(!confirm('Xóa?'))return;btn.disabled=true;var r=await sb2.from('transaction').delete().eq('id',id);if(r.error){toast('Lỗi',false);btn.disabled=false;}else{toast('Đã xóa!',true);await loadAll();pg(5);}}
// A4: LƯƠNG
function a4(){var h='<div class="form-card"><h3>Nhập lương</h3><div class="form-row"><div class="form-group"><label>Tháng</label><input type="month" id="slm" value="'+gm()+'"></div><div class="form-group"><label>Nhân sự</label><select id="sls">';staffList.forEach(function(s){h+='<option value="'+s.id+'">'+s.short_name+'</option>';});h+='</select></div><div class="form-group"><label>Lương CB</label><input type="number" id="slb" placeholder="0"></div></div><div class="form-row"><div class="form-group"><label>Thưởng</label><input type="number" id="slx" placeholder="0" value="0"></div><div class="form-group"><label>Ghi chú</label><input type="text" id="sln" placeholder=""></div></div><div class="btn-row"><button class="btn btn-primary" onclick="svsl(this)">Lưu</button></div></div>';
h+='<div class="section-title">Lịch sử lương</div><div class="table-wrap"><table><tr><th>Tháng</th><th>NV</th><th style="text-align:right;">Lương CB</th><th style="text-align:right;">Thưởng</th><th style="text-align:right;">Tổng</th><th></th></tr>';salaryData.slice(0,20).forEach(function(s){h+='<tr><td>T'+parseInt(s.month.split('-')[1])+'/'+s.month.split('-')[0]+'</td><td>'+(s.staff?s.staff.short_name:'—')+'</td><td class="mono" style="text-align:right;">'+ff(s.base_salary)+'</td><td class="mono" style="text-align:right;">'+ff(s.bonus)+'</td><td class="mono" style="text-align:right;font-weight:500;">'+ff(s.total)+'</td><td><button class="btn btn-red btn-sm" onclick="dlsl(this,\''+s.id+'\')">Xóa</button></td></tr>';});h+='</table></div>';return h;}
