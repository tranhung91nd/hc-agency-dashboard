body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--tx1);min-height:100vh;}

.logout-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--green-bg);color:var(--green-tx);border-radius:var(--radius);margin-bottom:16px;font-size:13px;}
</style>

function yesterday(){var d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split('T')[0];}
function bkr(){var dt=document.getElementById('bk-d');if(!dt)return;var date=dt.value;var ex={};dailyData.filter(function(d){return d.report_date===date;}).forEach(function(d){ex[d.ad_account_id]=d.spend_amount;});var h='<div style="font-size:12px;color:var(--tx3);margin-bottom:8px;">Nhập số tiền cho từng TK — bỏ trống = không thay đổi</div>';adList.forEach(function(a){var cur=ex[a.id];h+='<div class="bulk-row"><div><div class="bulk-label">'+(a.client?a.client.name:'—')+'</div><div class="bulk-sub">'+a.account_name+'</div></div><div style="font-size:12px;color:var(--tx3);">'+(cur!==undefined?'Hiện: '+ff(cur):'—')+'</div><input type="number" data-a="'+a.id+'" placeholder="'+(cur||0)+'" value="'+(cur!==undefined?cur:'')+'"></div>';});var el=document.getElementById('bk-rows');if(el)el.innerHTML=h;}
async function bks(){var btn=document.getElementById('bk-btn');btn.disabled=true;btn.textContent='Đang lưu...';var date=document.getElementById('bk-d').value;var rows=document.querySelectorAll('#bk-rows input[data-a]');var up=[];rows.forEach(function(r){var v=r.value.trim();if(v!=='')up.push({ad_account_id:r.dataset.a,report_date:date,spend_amount:parseInt(v)||0});});if(!up.length){toast('Không có data',false);btn.disabled=false;btn.textContent='Lưu tất cả';return;}var res=await sb2.from('daily_spend').upsert(up,{onConflict:'ad_account_id,report_date'});btn.disabled=false;btn.textContent='Lưu tất cả';if(res.error)toast('Lỗi: '+res.error.message,false);else{toast('Đã lưu '+up.length+' dòng!',true);await loadAll();pg(5);}}
async function dss(btn){btn.disabled=true;var date=document.getElementById('ds-d').value,aid=document.getElementById('ds-a').value,amt=parseInt(document.getElementById('ds-v').value)||0;if(!date||!aid){toast('Chọn ngày và TK',false);btn.disabled=false;return;}var res=await sb2.from('daily_spend').upsert({ad_account_id:aid,report_date:date,spend_amount:amt},{onConflict:'ad_account_id,report_date'});btn.disabled=false;if(res.error)toast('Lỗi: '+res.error.message,false);else{toast('Đã lưu!',true);document.getElementById('ds-v').value='';await loadAll();pg(5);}}
async function dsd(btn,id){if(!confirm('Xóa?'))return;btn.disabled=true;var res=await sb2.from('daily_spend').delete().eq('id',id);if(res.error){toast('Lỗi',false);btn.disabled=false;}else{toast('Đã xóa!',true);await loadAll();pg(5);}}
async function loadMetaAccounts(){if(metaAccounts.length)return;try{var all=[];var url='https://graph.facebook.com/v25.0/me/adaccounts?fields=id,name,account_status&limit=100&access_token='+META_TOKEN;while(url){var resp=await fetch(url);var data=await resp.json();if(data.error){toast('Meta API lỗi: '+data.error.message,false);return;}all=all.concat(data.data||[]);url=data.paging&&data.paging.next?data.paging.next:null;}metaAccounts=all.filter(function(a){return a.account_status===1;});}catch(e){toast('Lỗi kết nối Meta: '+e.message,false);}}
async function doMetaSync(btn){var date=document.getElementById('meta-sync-date').value;if(!date){toast('Chọn ngày',false);return;}btn.disabled=true;btn.textContent='Đang đồng bộ...';var log=document.getElementById('meta-sync-log');log.innerHTML='<div class="loading">Đang kéo dữ liệu từ Meta...</div>';var mapped=adList.filter(function(a){return a.fb_account_id;});if(!mapped.length){log.innerHTML='<div class="alert alert-warn">Chưa có TK nào được ghép nối Meta. Vào tab "Tài khoản QC" → bấm "Đồng bộ Meta" trước.</div>';btn.disabled=false;btn.textContent='Đồng bộ doanh số';return;}
var results=[],errors=0,saved=0;
for(var i=0;i<mapped.length;i++){var a=mapped[i];
try{
if(a.is_shared){
// TK dùng chung: kéo theo chiến dịch, tách NV + KH
var url='https://graph.facebook.com/v25.0/'+a.fb_account_id+'/insights?level=campaign&fields=campaign_name,spend&time_range={"since":"'+date+'","until":"'+date+'"}&limit=500&access_token='+META_TOKEN;
var resp=await fetch(url);var data=await resp.json();
if(data.error){results.push({name:a.account_name,status:'error',msg:data.error.message});errors++;continue;}
// Xóa data cũ của TK dùng chung ngày này
await sb2.from('daily_spend').delete().eq('ad_account_id',a.id).eq('report_date',date).not('staff_id','is',null);
var comboSpend={},unmatched=0,unmatchedSpend=0;
(data.data||[]).forEach(function(c){
var spend=Math.round(parseFloat(c.spend||0));if(!spend)return;
var cname=c.campaign_name||'';var parts=cname.split('_');
var staffPart=(parts[0]||'').trim();
var clientPart=(parts[2]||'').trim();
var matchedStaff=allStaff.find(function(s){return s.campaign_keyword&&staffPart.toLowerCase()===s.campaign_keyword.toLowerCase();});
var matchedClient=clientList.find(function(cl){return cl.campaign_keyword&&clientPart.toLowerCase().indexOf(cl.campaign_keyword.toLowerCase())>=0;});
if(matchedStaff){
var key=matchedStaff.id+'|'+(matchedClient?matchedClient.id:'');
if(!comboSpend[key])comboSpend[key]={staffId:matchedStaff.id,clientId:matchedClient?matchedClient.id:null,spend:0,staffName:matchedStaff.short_name,clientName:matchedClient?matchedClient.name:'?'};
comboSpend[key].spend+=spend;
}else{unmatched++;unmatchedSpend+=spend;}});
var comboKeys=Object.keys(comboSpend);
for(var k=0;k<comboKeys.length;k++){
var cb=comboSpend[comboKeys[k]];
var r=await sb2.from('daily_spend').insert({ad_account_id:a.id,report_date:date,spend_amount:cb.spend,staff_id:cb.staffId,matched_client_id:cb.clientId});
if(!r.error)saved++; else errors++;}
var detail=comboKeys.map(function(k2){var cb2=comboSpend[k2];return cb2.staffName+'/'+cb2.clientName+': '+ff(cb2.spend);}).join(', ');
if(unmatched)detail+=' | Chưa khớp: '+unmatched+' CD ('+ff(unmatchedSpend)+')';
results.push({name:a.account_name+' (dùng chung)',status:'ok',spend:comboKeys.reduce(function(t,k3){return t+comboSpend[k3].spend;},0),detail:detail});
}else{
// TK thường: kéo cấp tài khoản
var url2='https://graph.facebook.com/v25.0/'+a.fb_account_id+'/insights?fields=spend&time_range={"since":"'+date+'","until":"'+date+'"}&access_token='+META_TOKEN;
var resp2=await fetch(url2);var data2=await resp2.json();
if(data2.error){results.push({name:a.account_name,status:'error',msg:data2.error.message});errors++;continue;}
var spend2=0;if(data2.data&&data2.data.length>0){spend2=Math.round(parseFloat(data2.data[0].spend));}
var r2=await sb2.from('daily_spend').upsert({ad_account_id:a.id,report_date:date,spend_amount:spend2},{onConflict:'ad_account_id,report_date'});
if(r2.error){results.push({name:a.account_name,status:'error',msg:r2.error.message});errors++;}
else{results.push({name:a.account_name,status:'ok',spend:spend2});saved++;}
}}catch(e){results.push({name:a.account_name,status:'error',msg:e.message});errors++;}}
var lh='<div class="alert '+(errors?'alert-warn':'alert-ok')+'">Đồng bộ xong: '+saved+' thành công'+(errors?', '+errors+' lỗi':'')+'</div>';
lh+='<div class="table-wrap"><table><tr><th>Tài khoản</th><th>Trạng thái</th><th style="text-align:right;">Doanh số</th><th>Chi tiết</th></tr>';
results.forEach(function(r){
if(r.status==='ok')lh+='<tr><td>'+r.name+'</td><td><span class="badge b-green">OK</span></td><td class="mono" style="text-align:right;">'+ff(r.spend)+'</td><td style="font-size:11px;color:var(--tx2);">'+(r.detail||'')+'</td></tr>';
else lh+='<tr><td>'+r.name+'</td><td><span class="badge b-red">Lỗi</span></td><td colspan="2" style="font-size:12px;color:var(--red);">'+r.msg+'</td></tr>';});
lh+='</table></div>';log.innerHTML=lh;btn.disabled=false;btn.textContent='Đồng bộ doanh số';if(saved)await loadAll();}

async function init(){await checkAuth();await loadAll();}
init();
</script>
