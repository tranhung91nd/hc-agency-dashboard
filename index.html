<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>HC Agency — Hệ thống quản trị</title>
<meta name="theme-color" content="#2563EB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HC Agency">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--tx1);min-height:100vh;}
.app{display:grid;grid-template-columns:180px 1fr;min-height:100vh;}
@media(max-width:768px){.app{grid-template-columns:1fr;min-height:auto;}.sidebar{display:none;position:fixed;z-index:100;width:220px;transform:none;}.sidebar.open{display:block;box-shadow:4px 0 20px rgba(0,0,0,.2);}}
.sidebar{background:var(--bg2);border-right:1px solid var(--bd1);padding:16px 0;position:sticky;top:0;height:100vh;overflow-y:auto;transition:transform .25s;}
.logo{padding:8px 20px 20px;border-bottom:1px solid var(--bd1);margin-bottom:8px;}.logo h1{font-size:18px;font-weight:600;}.logo span{font-size:11px;color:var(--tx3);}
.logo .live{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:4px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:var(--tx2);cursor:pointer;transition:all .15s;border-left:3px solid transparent;}
.nav-item:hover{background:var(--bd1);color:var(--tx1);}.nav-item.active{background:var(--blue-bg);color:var(--blue-tx);font-weight:500;border-left-color:var(--blue);}
.nav-tree{display:none;margin:2px 0 6px 20px;padding-left:16px;border-left:1px solid var(--bd2);}
.nav-tree.open{display:block;}
.nav-subitem{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:12px;color:var(--tx3);cursor:pointer;border-radius:0 var(--radius) var(--radius) 0;transition:all .15s;}
.nav-subitem:hover{background:rgba(55,138,221,.06);color:var(--tx1);}
.nav-subitem.active{background:var(--blue-bg);color:var(--blue-tx);font-weight:500;}
.nav-subdot{width:6px;height:6px;border-radius:50%;background:var(--bd2);flex-shrink:0;}
.nav-subitem.active .nav-subdot{background:var(--blue);}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nav-sep{height:1px;background:var(--bd1);margin:8px 20px;}.nav-label{padding:8px 20px 4px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);}
.mobile-header{display:none;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--bd1);position:sticky;top:0;z-index:50;}
@media(max-width:768px){.mobile-header{display:flex;align-items:center;gap:12px;}}
.hamburger{width:28px;height:28px;display:flex;flex-direction:column;justify-content:center;gap:4px;cursor:pointer;background:none;border:none;padding:4px;}.hamburger span{display:block;width:100%;height:2px;background:var(--tx1);border-radius:1px;}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:99;}.overlay.show{display:block;}
.main{padding:24px 28px;overflow-y:auto;}@media(max-width:768px){.main{padding:16px;}}
.page-title{font-size:20px;font-weight:600;margin-bottom:4px;}.page-sub{font-size:13px;color:var(--tx3);margin-bottom:16px;}
.kpi-grid{display:grid;gap:10px;margin-bottom:16px;}.kpi-4{grid-template-columns:repeat(4,1fr);}.kpi-3{grid-template-columns:repeat(3,1fr);}
@media(max-width:768px){.kpi-4,.kpi-3{grid-template-columns:repeat(2,1fr);}}
.kpi{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;}.kpi-label{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;}.kpi-value{font-size:22px;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums;}.kpi-note{font-size:11px;color:var(--tx3);margin-top:2px;}
.section-title{font-size:14px;font-weight:600;margin:20px 0 8px;}.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:500px;}th{text-align:left;padding:8px 10px;font-size:11px;font-weight:500;color:var(--tx3);border-bottom:1px solid var(--bd2);text-transform:uppercase;letter-spacing:.3px;}td{padding:8px 10px;border-bottom:1px solid var(--bd1);font-size:13px;}tr:hover td{background:var(--bg2);}
.mono{font-variant-numeric:tabular-nums;font-size:13px;letter-spacing:-0.01em;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;}.b-green{background:var(--green-bg);color:var(--green-tx);}.b-red{background:var(--red-bg);color:var(--red-tx);}.b-amber{background:var(--amber-bg);color:var(--amber-tx);}.b-blue{background:var(--blue-bg);color:var(--blue-tx);}.b-purple{background:var(--purple-bg);color:var(--purple-tx);}.b-coral{background:var(--coral-bg);color:var(--coral-tx);}.b-pink{background:var(--pink-bg);color:var(--pink-tx);}.b-gray{background:var(--bg3);color:var(--tx3);}
.bar-track{height:6px;border-radius:3px;background:var(--bd1);width:100%;}.bar-fill{height:6px;border-radius:3px;}
.avatar{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.staff-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;}@media(max-width:768px){.staff-cards{grid-template-columns:repeat(2,1fr);}}
.staff-card{background:var(--bg2);border-radius:var(--radius-lg);padding:12px 14px;cursor:pointer;border:2px solid transparent;transition:all .15s;}.staff-card:hover{border-color:var(--bd2);}.staff-card.active{border-color:var(--blue);background:var(--blue-bg);}
.staff-card-name{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;margin-bottom:4px;}.staff-card-value{font-size:20px;font-weight:600;margin-bottom:2px;}.staff-card-sub{font-size:11px;color:var(--tx3);}
.detail-panel{background:var(--bg1);border:1px solid var(--bd1);border-radius:var(--radius-lg);padding:16px;margin-top:10px;}
.kh-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd1);}.kh-row:last-child{border-bottom:none;}.kh-name{font-weight:500;font-size:13px;}.kh-tk{font-size:11px;color:var(--tx3);}.kh-val{font-variant-numeric:tabular-nums;font-size:13px;font-weight:600;}
.day-btns{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;}.day-btn{padding:6px 12px;font-size:12px;cursor:pointer;border-radius:var(--radius);border:1px solid var(--bd2);background:var(--bg1);color:var(--tx2);font-variant-numeric:tabular-nums;transition:all .12s;}.day-btn:hover{background:var(--bg2);}.day-btn.active{background:var(--blue-bg);color:var(--blue-tx);border-color:var(--blue);}
.total-bar{margin-top:12px;padding:12px 16px;background:var(--bg2);border-radius:var(--radius);display:flex;justify-content:space-between;align-items:center;font-size:14px;}.total-bar span:last-child{font-weight:600;font-size:18px;}
.loading{text-align:center;padding:40px;color:var(--tx3);font-size:14px;}.loading::after{content:'';display:inline-block;width:16px;height:16px;border:2px solid var(--bd2);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle;}@keyframes spin{to{transform:rotate(360deg);}}
.error-box{padding:16px;background:var(--red-bg);color:var(--red-tx);border-radius:var(--radius);margin:20px 0;font-size:13px;}
.admin-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;}.admin-tab{padding:8px 16px;font-size:13px;cursor:pointer;border-radius:var(--radius);border:1px solid var(--bd2);background:var(--bg1);color:var(--tx2);transition:all .12s;}.admin-tab:hover{background:var(--bg2);}.admin-tab.active{background:var(--blue-bg);color:var(--blue-tx);border-color:var(--blue);font-weight:500;}
.form-card{background:var(--bg1);border:1px solid var(--bd1);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;}.form-card h3{font-size:15px;font-weight:600;margin-bottom:12px;}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:10px;}.form-group{display:flex;flex-direction:column;gap:4px;}.form-group label{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;}
.form-group input,.form-group select{padding:8px 10px;border:1px solid var(--bd2);border-radius:var(--radius);background:var(--bg2);color:var(--tx1);font-size:13px;font-family:inherit;outline:none;transition:border .15s;}.form-group input:focus,.form-group select:focus{border-color:var(--blue);}
.btn{padding:8px 16px;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;}.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--blue);color:#fff;}.btn-primary:hover:not(:disabled){opacity:.9;}.btn-red{background:var(--red);color:#fff;}.btn-red:hover:not(:disabled){opacity:.9;}.btn-green{background:var(--green);color:#fff;}.btn-green:hover:not(:disabled){opacity:.9;}.btn-ghost{background:transparent;color:var(--tx2);border:1px solid var(--bd2);}.btn-ghost:hover{background:var(--bg2);}.btn-sm{padding:4px 10px;font-size:11px;}
.btn-row{display:flex;gap:8px;margin-top:12px;}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:999;animation:slideIn .3s;box-shadow:0 4px 12px rgba(0,0,0,.15);}.toast-ok{background:var(--green);color:#fff;}.toast-err{background:var(--red);color:#fff;}@keyframes slideIn{from{transform:translateX(100px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.tag-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:500;background:var(--bg3);color:var(--tx2);}.tag .x{cursor:pointer;font-size:13px;line-height:1;opacity:.6;}.tag .x:hover{opacity:1;}
.inline-fee-input{width:150px;padding:8px 10px;border:1px solid var(--bd2);border-radius:10px;background:#fff;color:var(--tx1);font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;text-align:right;outline:none;}
.inline-fee-input:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.1);}
.inline-fee-input:disabled{background:var(--bg3);color:var(--tx3);cursor:not-allowed;}
.invoice-card{border:1px solid rgba(15,23,42,.10);border-radius:20px;overflow:hidden;background:#fff;box-shadow:0 1px 3px rgba(15,23,42,.04),0 8px 24px rgba(15,23,42,.06);}
.invoice-head{padding:20px 24px 16px;border-bottom:1px solid rgba(15,23,42,.06);display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;background:linear-gradient(180deg,#f8fafc 0%,#ffffff 100%);}
.invoice-title{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--tx1);}
.invoice-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px;font-size:12px;color:var(--tx2);}
.invoice-body{padding:20px 24px 10px;}
.invoice-label{font-size:11px;font-weight:700;color:var(--blue-tx);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.invoice-account-row{display:flex;justify-content:space-between;gap:12px;padding:10px 12px;border-bottom:none;font-size:13px;border-radius:8px;margin:2px -12px;transition:background .12s;}
.invoice-account-row:hover{background:rgba(15,23,42,.02);}
.invoice-account-name{font-weight:600;color:var(--tx1);}
.invoice-account-value{font-weight:600;color:var(--teal);font-variant-numeric:tabular-nums;}
.invoice-sum-row{display:flex;justify-content:space-between;gap:14px;padding:14px 0;font-size:14px;border-top:1px solid rgba(15,23,42,.06);border-bottom:none;}
.invoice-sum-row:last-child{border-bottom:none;}
.invoice-sum-label{color:var(--tx2);}
.invoice-sum-value{font-weight:700;color:var(--tx1);font-variant-numeric:tabular-nums;}
.invoice-fee-row{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:16px 0 14px;border-bottom:none;}
.invoice-fee-box{display:flex;align-items:center;gap:10px;padding:10px 16px;border:1px solid rgba(15,23,42,.10);border-radius:12px;background:#fff;box-shadow:0 1px 3px rgba(15,23,42,.04);min-width:270px;justify-content:flex-end;}
.invoice-fee-currency{font-size:15px;font-weight:600;color:var(--tx2);}
.invoice-edit-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;background:#ffe5e1;color:#cc4b37;font-size:10px;font-weight:700;line-height:1;}
.invoice-fee-display{font-size:14px;font-weight:700;color:var(--teal);font-variant-numeric:tabular-nums;cursor:pointer;padding:4px 8px;border-radius:8px;transition:background .15s;min-width:80px;text-align:right;}
.invoice-fee-display:hover{background:rgba(37,99,235,.08);}
.invoice-note{padding:10px 0 14px;font-size:12px;font-style:italic;color:var(--tx2);}
.invoice-total{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;padding:18px 0 22px;border-top:1px solid rgba(15,23,42,.06);margin-top:4px;}
.invoice-total-label{font-size:16px;font-weight:700;color:var(--tx1);}
.invoice-total-value{font-size:28px;font-weight:800;letter-spacing:-.03em;color:var(--teal);font-variant-numeric:tabular-nums;}
.invoice-paybox{padding:20px 24px;background:linear-gradient(180deg,#f8fafc 0%,#f1f5f9 100%);border-top:1px solid rgba(15,23,42,.06);display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.invoice-qr-wrap{width:90px;height:90px;border-radius:14px;background:#fff;border:1px solid rgba(15,23,42,.08);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(15,23,42,.06);}
.invoice-qr-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.invoice-qr-fallback{display:none;padding:10px;text-align:center;font-size:11px;color:var(--tx3);line-height:1.5;}
.invoice-bank-title{font-size:14px;font-weight:700;color:var(--tx1);margin-bottom:6px;}
.invoice-bank-lines{font-size:13px;color:var(--tx2);line-height:1.9;}
.invoice-bank-lines strong{color:var(--tx1);}
.invoice-actions{padding:16px 24px;background:#fff;border-top:1px solid rgba(15,23,42,.06);display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;position:relative;z-index:301;overflow:visible;}
.invoice-btn{min-width:110px;min-height:44px;border-radius:12px;border:1px solid rgba(15,23,42,.12);background:#fff;color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;box-shadow:0 1px 3px rgba(15,23,42,.05);white-space:nowrap;position:relative;z-index:2;}
.invoice-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(15,23,42,.10);background:#f8fafc;color:var(--tx1);}
.invoice-btn:active{transform:translateY(0);box-shadow:0 1px 2px rgba(15,23,42,.06);}
.vat-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:10px;font-weight:700;line-height:1;}
.invoice-status-badge{display:inline-flex;align-items:center;padding:6px 14px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.01em;}
@media(max-width:768px){
  .invoice-head,.invoice-body,.invoice-paybox,.invoice-actions{padding-left:16px;padding-right:16px;}
  .invoice-fee-row,.invoice-total{flex-direction:column;align-items:flex-start;}
  .invoice-fee-box{min-width:100%;justify-content:space-between;}
  .inline-fee-input{width:100%;flex:1;}
  .invoice-actions{justify-content:stretch;}
  .invoice-btn{flex:1 1 0;}
}
.bulk-row{display:grid;grid-template-columns:1fr 2fr 140px;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd1);}.bulk-row:last-child{border-bottom:none;}.bulk-row input{padding:6px 8px;border:1px solid var(--bd2);border-radius:var(--radius);background:var(--bg2);color:var(--tx1);font-size:13px;font-variant-numeric:tabular-nums;text-align:right;width:100%;}.bulk-row input:focus{border-color:var(--blue);outline:none;}.bulk-label{font-size:12px;color:var(--tx2);}.bulk-sub{font-size:11px;color:var(--tx3);}
.month-filter{display:flex;gap:8px;align-items:center;margin-bottom:16px;}.month-filter select{padding:6px 10px;border:1px solid var(--bd2);border-radius:var(--radius);background:var(--bg1);color:var(--tx1);font-size:13px;}
.assign-panel{background:var(--bg1);border:1px solid var(--bd1);border-radius:var(--radius-lg);overflow:hidden;margin:4px 0;}
.assign-row{display:grid;grid-template-columns:1fr 1fr 130px 130px 50px;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd1);font-size:12px;}.assign-row:last-child{border-bottom:none;}
.xp-head{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;background:var(--bg2);border-bottom:1px solid var(--bd1);}
.xp-tabs{display:flex;border-bottom:1px solid var(--bd1);}.xp-tab{padding:10px 20px;font-size:12px;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;}.xp-tab:hover{color:var(--tx1);}.xp-tab.on{color:var(--purple);border-bottom-color:var(--purple);font-weight:500;}
.xp-body{padding:16px 18px;}
.sc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}@media(max-width:768px){.sc-grid{grid-template-columns:1fr;}}
.sc-card{border:1px solid var(--bd1);border-radius:var(--radius-lg);padding:14px 16px;}.sc-card:hover{border-color:var(--bd2);}
.sc-head2{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sc-spend2{font-size:22px;font-weight:600;font-variant-numeric:tabular-nums;margin-bottom:4px;}
.sc-bar2{height:4px;border-radius:2px;background:var(--bd1);margin-bottom:8px;}.sc-fill2{height:4px;border-radius:2px;}
.sc-cl{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:4px 8px;border-radius:6px;background:var(--bg2);margin-bottom:3px;}
.sc-cl:last-child{margin-bottom:0;}
.xp-footer{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;background:var(--bg2);border-top:1px solid var(--bd1);font-size:12px;}
.xp-minibar{display:flex;height:6px;border-radius:3px;overflow:hidden;flex:1;max-width:180px;margin:0 12px;}.xp-minibar div{height:100%;}
.fi{padding:6px 10px;border:1px solid var(--bd2);border-radius:var(--radius);background:var(--bg2);color:var(--tx1);font-size:12px;font-family:inherit;outline:none;}.fi:focus{border-color:var(--blue);}
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.sum-card{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;}.sum-label{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;}.sum-val{font-size:22px;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums;}.sum-note{font-size:11px;color:var(--tx3);margin-top:2px;}
.filter-bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}.filter-count{font-size:11px;color:var(--tx3);margin-left:4px;}
.active-chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;background:var(--blue-bg);color:var(--blue-tx);}.chip .x{cursor:pointer;opacity:.6;font-size:12px;line-height:1;}.chip .x:hover{opacity:1;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0;}.dot-ok{background:var(--green);}.dot-off{background:var(--red);}.dot-warn{background:var(--amber);}
.st-text{display:inline-flex;align-items:center;font-size:12px;white-space:nowrap;}
.tk-name{font-weight:600;font-size:13px;cursor:pointer;transition:color .15s;}.tk-name:hover{color:var(--blue);}
.tk-id{font-size:10px;color:var(--tx3);font-variant-numeric:tabular-nums;margin-top:1px;}
.nv-cell{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:3px 5px;border-radius:6px;margin:-3px -5px;transition:background .1s;}.nv-cell:hover{background:var(--bg2);}
.kh-cell{font-size:12px;color:var(--tx2);cursor:pointer;padding:3px 5px;border-radius:6px;margin:-3px -5px;transition:background .1s;}.kh-cell:hover{background:var(--bg2);}
.edit-hint{font-size:10px;color:var(--tx3);opacity:0;transition:opacity .15s;margin-left:3px;}.nv-cell:hover .edit-hint,.kh-cell:hover .edit-hint{opacity:1;}
.nv-badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:8px;}
.spend-num{font-size:16px;font-weight:500;font-variant-numeric:tabular-nums;color:var(--teal);text-align:right;}
.spend-bar{height:5px;border-radius:3px;background:var(--bd1);margin-top:5px;width:100%;max-width:120px;margin-left:auto;}.spend-fill{height:5px;border-radius:3px;background:var(--green);}
.spend-zero{font-size:13px;color:var(--tx3);text-align:right;}
.bal-val{font-size:16px;font-weight:500;font-variant-numeric:tabular-nums;}.bal-ok{color:var(--tx1);}.bal-warn{color:var(--amber);}.bal-danger{color:var(--red);}
.bal-track{height:5px;border-radius:3px;background:var(--bd1);margin-top:5px;max-width:120px;}.bal-used{height:5px;border-radius:3px 0 0 3px;}.bal-used-ok{background:var(--blue);}.bal-used-warn{background:var(--amber);}.bal-used-danger{background:var(--red);}
.bal-sub{font-size:10px;color:var(--tx3);margin-top:3px;font-variant-numeric:tabular-nums;}.bal-none{font-size:11px;color:var(--tx3);}
.pq{font-size:11px;padding:3px 10px;border-radius:12px;cursor:pointer;display:inline-block;}.pq-r{background:var(--bg3);color:var(--tx3);}.pq-s{background:var(--purple-bg);color:var(--purple-tx);}
.shared-row{background:rgba(83,74,183,0.02);}
.sort-arrow{font-size:10px;margin-left:3px;opacity:.25;}.sort-arrow.on{opacity:1;color:var(--blue);}
.sort-th{cursor:pointer;user-select:none;white-space:nowrap;transition:background .12s;} .sort-th:hover{background:var(--bg2);}
.foot-row td{background:var(--bg2);font-weight:600;border-top:1px solid var(--bd2);}
@media(max-width:768px){.sum-grid{grid-template-columns:1fr 1fr;}}
.login-box{max-width:360px;margin:60px auto;background:var(--bg1);border:1px solid var(--bd1);border-radius:var(--radius-lg);padding:32px;}
.login-box h2{font-size:18px;font-weight:600;margin-bottom:4px;}.login-box p{font-size:13px;color:var(--tx3);margin-bottom:20px;}
.login-box .form-group{margin-bottom:12px;}.login-box .btn{width:100%;margin-top:8px;}
.login-err{color:var(--red);font-size:12px;margin-top:8px;}
.logout-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--green-bg);color:var(--green-tx);border-radius:var(--radius);margin-bottom:16px;font-size:13px;}
.sync-bar{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--blue);color:#fff;padding:6px 20px;font-size:12px;display:flex;align-items:center;gap:8px;transition:transform .3s;}.sync-bar.hidden{transform:translateY(-100%);}.sync-bar .spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;}.sync-bar.done{background:var(--green);}
.ai-fab{position:fixed;bottom:20px;right:20px;border-radius:28px;background:var(--tx1);color:var(--bg2);border:none;font-size:13px;font-weight:500;cursor:pointer;z-index:300;transition:transform .15s;display:flex;align-items:center;gap:8px;padding:10px 18px 10px 12px;}.ai-fab:hover{transform:scale(1.05);}.ai-fab svg{flex-shrink:0;}
.ai-panel{position:fixed;bottom:80px;right:20px;width:400px;max-height:620px;background:var(--bg1);border:1px solid var(--bd1);border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1);z-index:300;display:none;flex-direction:column;overflow:hidden;}
.ai-panel.open{display:flex;}
.ai-header{background:var(--bg1);padding:14px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-bottom:1px solid var(--bd1);}.ai-header-info{display:flex;align-items:center;gap:10px;}.ai-avatar{width:34px;height:34px;border-radius:10px;background:var(--tx1);display:flex;align-items:center;justify-content:center;}
.ai-msgs{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px;background:var(--bg3);}
.ai-msg{display:flex;gap:8px;}.ai-msg-bot .ai-dot{width:22px;height:22px;border-radius:6px;background:var(--tx1);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.ai-bubble{border-radius:4px 14px 14px 14px;padding:12px 14px;max-width:82%;font-size:13px;line-height:1.65;background:var(--bg1);border:1px solid var(--bd1);}.ai-msg-user{justify-content:flex-end;}.ai-msg-user .ai-bubble{background:var(--tx1);color:var(--bg2);border:none;border-radius:14px 4px 14px 14px;}
.ai-input-bar{padding:12px 14px;border-top:1px solid var(--bd1);display:flex;gap:8px;background:var(--bg1);flex-shrink:0;}.ai-input-bar input{flex:1;padding:9px 14px;border:1px solid var(--bd1);border-radius:12px;background:var(--bg3);color:var(--tx1);font-size:13px;font-family:inherit;outline:none;}.ai-input-bar input:focus{border-color:var(--tx3);}.ai-send{width:36px;height:36px;border-radius:10px;background:var(--tx1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}.ai-send:disabled{opacity:.4;}
.ai-quick{padding:8px 14px;background:var(--bg1);border-top:1px solid var(--bd1);display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;}.ai-qbtn{font-size:11px;padding:4px 12px;border-radius:20px;background:var(--bg2);border:none;color:var(--tx2);cursor:pointer;font-family:inherit;transition:background .12s;}.ai-qbtn:hover{background:var(--bd1);}
.ai-typing{display:flex;gap:4px;padding:4px 0;}.ai-typing span{width:6px;height:6px;border-radius:50%;background:var(--tx3);animation:blink 1.2s infinite;}.ai-typing span:nth-child(2){animation-delay:.2s;}.ai-typing span:nth-child(3){animation-delay:.4s;}@keyframes blink{0%,100%{opacity:.3;}50%{opacity:1;}}
@media(max-width:480px){.ai-panel{width:calc(100vw - 16px);right:8px;bottom:72px;max-height:75vh;}}

/* ===== UI refinement override ===== */
:root{
  --bg1:#ffffff;
  --bg2:#f8fafc;
  --bg3:#f2f5fa;
  --tx1:#0f172a;
  --tx2:#475569;
  --tx3:#94a3b8;
  --bd1:rgba(15,23,42,0.08);
  --bd2:rgba(15,23,42,0.14);
  --green:#059669;
  --green-bg:#ecfdf5;
  --green-tx:#047857;
  --red:#dc2626;
  --red-bg:#fef2f2;
  --red-tx:#b91c1c;
  --amber:#d97706;
  --amber-bg:#fff7ed;
  --amber-tx:#b45309;
  --blue:#2563eb;
  --blue-bg:#eff6ff;
  --blue-tx:#1d4ed8;
  --purple:#5b4ce6;
  --purple-bg:#f3f0ff;
  --purple-tx:#4338ca;
  --coral:#ea580c;
  --coral-bg:#fff7ed;
  --coral-tx:#c2410c;
  --pink:#db2777;
  --pink-bg:#fdf2f8;
  --pink-tx:#be185d;
  --teal:#0f766e;
  --teal-bg:#ecfeff;
  --teal-tx:#0f766e;
  --radius:12px;
  --radius-lg:18px;
  --shadow-sm:0 8px 24px rgba(15,23,42,0.06);
  --shadow-md:0 16px 40px rgba(15,23,42,0.08);
}
html{scroll-behavior:smooth;}
body{

function buildRecTable(filter,cardFilter){

async function handleVcbUpload(file){
if(!file)return;
toast('Đang phân tích sao kê...',true);
try{
var data=await file.arrayBuffer();
var XLSX=await loadXLSX();
var wb=XLSX.read(data,{type:'array'});
var ws=wb.Sheets[wb.SheetNames[0]];
var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
var startRow=-1;
for(var i=0;i<Math.min(20,rows.length);i++){if(String(rows[i][1]||'').indexOf('STT')>=0){startRow=i+1;break;}}
if(startRow<0){toast('Không nhận dạng được format sao kê VCB',false);return;}
var vcbRows=[],mv4bRows=[],otherRows=[],allDates=[];
for(var j=startRow;j<rows.length;j++){
var row=rows[j];var stt=row[1];if(!stt||isNaN(parseInt(stt)))continue;
var dateDoc=String(row[2]||''),debitRaw=row[3],creditRaw=row[4],detail=String(row[6]||'');
var date=dateDoc.split('\n')[0].trim();if(!date||date.length<8)continue;
var debit=parseFloat(String(debitRaw).replace(/,/g,''))||0;
var credit=parseFloat(String(creditRaw).replace(/,/g,''))||0;
var isFb=detail.indexOf('FACEBK')>=0;
if(!isFb){if(debit||credit)otherRows.push({date:date,debit:debit,credit:credit,detail:detail});continue;}
var refMatch=detail.match(/FACEBK\s*\*(\S+)/);
var refCode=refMatch?refMatch[1].replace(/\s+/g,''):'';
var cardMatch=detail.match(/\.{3,}(\d{4})\./)||detail.match(/\.(\d{4})\./);
var card='';
if(!card){var docParts=dateDoc.split('\n');if(docParts.length>1){var docNum=docParts[1]||'';var cm=docNum.match(/(\d{4})\s*-/);if(cm)card=cm[1];}}
var isMv4b=refCode.indexOf('MV4B')>=0||refCode==='MV4B';
var entry={date:date,debit:debit,refCode:refCode,card:card,detail:detail,isMv4b:isMv4b};
if(isMv4b)mv4bRows.push(entry);else vcbRows.push(entry);
if(allDates.indexOf(date)<0)allDates.push(date);}
allDates.sort();
toast('Đã parse '+vcbRows.length+' giao dịch FB + '+mv4bRows.length+' MV4B. Đang lấy Meta Billing...',true);
var metaTxns=await fetchMetaBilling(allDates);
var matched=matchVcbToMeta(vcbRows,metaTxns);
var totalVcb=vcbRows.reduce(function(t,v){return t+v.debit;},0);
var totalMeta=matched.reduce(function(t,m){return t+(m.meta?m.meta.amount:0);},0);
reconcileData={fileName:file.name,vcbRows:vcbRows,mv4bRows:mv4bRows,otherRows:otherRows,matched:matched,totalVcb:totalVcb,totalMeta:totalMeta,dateRange:allDates.length?(allDates[0]+' — '+allDates[allDates.length-1]):''};
toast('Đối soát xong: '+matched.filter(function(m){return m.meta;}).length+'/'+vcbRows.length+' khớp mã',true);
render();
}catch(e){toast('Lỗi: '+e.message,false);}}

async function fetchMetaBilling(dateRange){
var results=[];
var mapped=adList.filter(function(a){return a.fb_account_id;});
if(!mapped.length){toast('Chưa có TK nào ghép Meta',false);return results;}
var minDate=dateRange[0],maxDate=dateRange[dateRange.length-1];
if(!minDate||!maxDate)return results;
var minParts=minDate.split('/'),maxParts=maxDate.split('/');
var since=minParts[2]+'-'+(minParts[1].length<2?'0':'')+minParts[1]+'-'+(minParts[0].length<2?'0':'')+minParts[0];
var until=maxParts[2]+'-'+(maxParts[1].length<2?'0':'')+maxParts[1]+'-'+(maxParts[0].length<2?'0':'')+maxParts[0];
var sinceTs=Math.floor(new Date(since+'T00:00:00+07:00').getTime()/1000)-172800;
var untilTs=Math.floor(new Date(until+'T23:59:59+07:00').getTime()/1000)+172800;
var dateRangeStr=sinceTs+'_'+untilTs;
for(var i=0;i<mapped.length;i+=50){
var chunk=mapped.slice(i,i+50);
var batchReqs=chunk.map(function(a){
return{method:'GET',relative_url:a.fb_account_id+'/transactions?fields=id,time,billing_amount,fatura_id,charge_type,payment_option,product_type&time_start='+sinceTs+'&time_stop='+untilTs+'&limit=500'};});
try{
var resp=await fetch('https://graph.facebook.com/v25.0/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'batch='+encodeURIComponent(JSON.stringify(batchReqs))+'&access_token='+META_TOKEN+'&include_headers=false'});
var bResults=await resp.json();
for(var k=0;k<bResults.length;k++){
try{
var httpCode=bResults[k].code||200;
var body=JSON.parse(bResults[k].body||'{}');
if(body.error){console.warn('[Billing] TK '+chunk[k].fb_account_id+':',body.error.message);continue;}
if(!body.data||!body.data.length)continue;
body.data.forEach(function(tx){
var acc=chunk[k];
var amt=0;
if(tx.billing_amount){
if(typeof tx.billing_amount==='object')amt=Math.round(Math.abs(parseFloat(tx.billing_amount.amount||tx.billing_amount.value||0)));
else amt=Math.round(Math.abs(parseFloat(tx.billing_amount)));
if(tx.billing_amount.currency==='USD')amt=Math.round(amt*25000);
}else if(tx.amount){amt=Math.round(Math.abs(parseFloat(tx.amount)));}
var refCode='';
if(tx.payment_option){
var po=typeof tx.payment_option==='string'?tx.payment_option:JSON.stringify(tx.payment_option);
var rm=po.match(/([A-Z0-9]{6,12}(?:42|F2|K2|Y2|G2|U2|X2|B2|N2|T2|62|82))/i);
if(rm)refCode=rm[1];}
var payAccId=acc?acc.fb_account_id:'';
results.push({transId:tx.id||'',amount:amt,time:tx.time||'',refCode:refCode,accountFbId:payAccId,accountName:acc?acc.account_name:'',accountId:payAccId,paymentAccountId:payAccId,invoiceId:tx.fatura_id||'',chargeType:tx.charge_type||'',sinceTs:String(sinceTs),untilTs:String(untilTs)});
});}catch(e){console.warn('[Billing] parse error:',e.message);}}
}catch(e){console.warn('Meta billing batch error:',e.message);}}
if(!results.length){
toast('Meta API không trả dữ liệu billing — đang fallback so khớp theo daily_spend',false);
return fallbackDailySpend(dateRange,dateRangeStr);}
return results;}

function fallbackDailySpend(dateRange,dateRangeStr){
var results=[];
dateRange.forEach(function(d){
var parts=d.split('/');if(parts.length<3)return;
var isoDate=parts[2]+'-'+(parts[1].length<2?'0':'')+parts[1]+'-'+(parts[0].length<2?'0':'')+parts[0];
dailyData.filter(function(ds){return ds.report_date===isoDate;}).forEach(function(ds){
var acc=adList.find(function(a){return a.id===ds.ad_account_id;});
results.push({transId:'',amount:ds.spend_amount,time:isoDate,refCode:'',accountFbId:acc?acc.fb_account_id:'',accountName:acc?acc.account_name:'',accountId:acc?acc.fb_account_id:'',paymentAccountId:acc?acc.fb_account_id:'',invoiceId:'',chargeType:'spend',sinceTs:'',untilTs:'',isSpendFallback:true});});});
return results;}

function matchVcbToMeta(vcbRows,metaTxns){
var used={};
var metaByRef={};
metaTxns.forEach(function(m,i){if(m.refCode){var k=m.refCode.toUpperCase();if(!metaByRef[k])metaByRef[k]={idx:i,meta:m};}});
return vcbRows.map(function(v){
var k=v.refCode.toUpperCase();
if(metaByRef[k]&&!used[metaByRef[k].idx]){
var mi=metaByRef[k];used[mi.idx]=true;
var d=Math.abs(v.debit-mi.meta.amount);
return{vcb:v,meta:mi.meta,diff:d,pctDiff:v.debit>0?(d/v.debit*100):0};}
var bestMatch=null,bestDiff=Infinity;
for(var i=0;i<metaTxns.length;i++){
if(used[i])continue;
var m=metaTxns[i];
var amtDiff=Math.abs(v.debit-m.amount);
var pctDiff=v.debit>0?(amtDiff/v.debit*100):100;
if(pctDiff<5&&amtDiff<bestDiff){bestDiff=amtDiff;bestMatch={idx:i,meta:m,diff:amtDiff,pctDiff:pctDiff};}}
if(bestMatch){used[bestMatch.idx]=true;return{vcb:v,meta:bestMatch.meta,diff:bestMatch.diff,pctDiff:bestMatch.pctDiff};}
return{vcb:v,meta:null,diff:0,pctDiff:0};});}

s.onload=function(){resolve(window.XLSX);};
s.onerror=function(){reject(new Error('Không tải được thư viện XLSX'));};
document.head.appendChild(s);});}

async function checkAuth(){var{data}=await sb2.auth.getSession();if(data.session){authUser=data.session.user;await loadUserRole();}}
async function loadUserRole(){
if(!authUser){userRole='guest';userAllowedPages=null;return;}
try{
var{data,error}=await sb2.from('user_roles').select('*').eq('email',authUser.email).maybeSingle();
if(data){userRole=data.role||'accountant';userAllowedPages=data.allowed_pages||[4];}
else{userRole='admin';userAllowedPages=null;}
}catch(e){userRole='admin';userAllowedPages=null;}}
function canAccessPage(pageNum){
if(!authUser)return true;
if(userRole==='admin'||!userAllowedPages)return true;
for(var i=0;i<userAllowedPages.length;i++){
var p=userAllowedPages[i];
if(p===pageNum)return true;
if(typeof p==='number'&&Math.floor(p)===pageNum)return true;
if(typeof p==='string'&&parseInt(p)===pageNum)return true;
}return false;}
function canAccessSubPage(pageNum,subTab){
if(!authUser)return true;
if(userRole==='admin'||!userAllowedPages)return true;
var subKey=pageNum+'.'+subTab;
var hasExact=false,hasParent=false;
for(var i=0;i<userAllowedPages.length;i++){
var p=userAllowedPages[i];
if(p===subKey||String(p)===subKey)hasExact=true;
if(p===pageNum)hasParent=true;}
if(hasParent)return true;
return hasExact;}
function isAdmin(){return authUser&&(userRole==='admin'||!userAllowedPages);}
async function loadAllUserRoles(){
try{var{data}=await sb2.from('user_roles').select('*').order('created_at');allUserRoles=data||[];}catch(e){allUserRoles=[];}}
async function loadAppSettings(){
try{
var{data,error}=await sb2.from('app_settings').select('key,value');
if(error){console.warn('[app_settings]',String(error.message||error));return;}
if(!data)return;
data.forEach(function(r){
if(r.key==='META_TOKEN'&&r.value)META_TOKEN=r.value;

if(r.key==='META_GLOBAL_SCOPE_ID'&&r.value)META_GLOBAL_SCOPE_ID=r.value;
});
}catch(e){console.warn('[loadAppSettings]',e.message);}}
async function saveAppSetting(key,value){

return true;}

function filterAdTable(){
var sfEl=document.getElementById('filter-staff'),scEl=document.getElementById('filter-client'),ssEl=document.getElementById('filter-status'),sqEl=document.getElementById('search-ad');
if(!sfEl||!scEl||!ssEl||!sqEl)return;

adFilterStaff=sf;adFilterClient=sc2;adFilterStatus=ss;adSearchText=sqEl.value||'';

total++;

var matchClient=!sc2||(sc2==='none'?r.dataset.client==='':r.dataset.client.indexOf(sc2)>=0);

var matchSearch=!sq||r.dataset.name.indexOf(sq)>=0;

r.style.display=show?'':'none';

if(sc2){var sel2=document.getElementById('filter-client');chips.push(sel2.options[sel2.selectedIndex].text);}

function buildCampAggregates(){
var today=td();
var d1=vnDateStr(-86400000),d2=vnDateStr(-172800000),d3=vnDateStr(-259200000);
var fourDays=[d3,d2,d1,today];
var latestStatus={};
campaignMessData.forEach(function(r){
var key=r.ad_account_id+'|'+r.campaign_id;
if(!latestStatus[key]||r.report_date>latestStatus[key].date){latestStatus[key]={date:r.report_date,status:r.campaign_status||'ACTIVE'};}});
var camps={};
campaignMessData.forEach(function(r){
if(fourDays.indexOf(r.report_date)<0)return;
var key=r.ad_account_id+'|'+r.campaign_id;
var st=latestStatus[key];
if(st&&st.status!=='ACTIVE')return;
if(!camps[key])camps[key]={aid:r.ad_account_id,cid:r.campaign_id,name:r.campaign_name,days:0,spend:0,mess:0,leads:0,ad:r.ad_account};
if(r.spend>0)camps[key].days++;
camps[key].spend+=r.spend||0;
camps[key].mess+=r.mess_count||0;
camps[key].leads+=(r.lead_count||0);});
return{camps:camps,today:today};}
function getMessAlerts(){
var agg=buildCampAggregates(),camps=agg.camps,today=agg.today;

Object.keys(camps).forEach(function(k){

if(c.days<4)return;
if(!c.ad||!c.ad.max_mess_cost)return;
// Chỉ cảnh báo camp có mess (không phải camp form)
if(c.mess===0&&c.leads>0)return;
var costPerMess=c.mess>0?Math.round(c.spend/c.mess):Infinity;
if(costPerMess>c.ad.max_mess_cost){
var acc=adList.find(function(a){return a.id===c.aid;});
var ca=acc?getAssign(acc.id,today):[];
var staffId=ca.length?ca[0].staff_id:null;
var staff=staffId?allStaff.find(function(s){return s.id===staffId;}):null;
alerts.push({campaign_name:c.name,campaign_id:c.cid,ad_account_id:c.aid,account_name:acc?acc.account_name:'',client_name:c.ad.client?c.ad.client.name:'',cost_per_mess:costPerMess,max_cost:c.ad.max_mess_cost,spend_4d:c.spend,mess_4d:c.mess,staff:staff,days:c.days,type:'mess'});}});
alerts.sort(function(a,b){return b.cost_per_mess-a.cost_per_mess;});
return alerts;}
function getLeadAlerts(){

async function runLimited(items,limit,worker){
var out=new Array(items.length),next=0,count=Math.min(limit,items.length);
var runners=Array.from({length:count},async function(){
while(next<items.length){var idx=next++;out[idx]=await worker(items[idx],idx);}
});
await Promise.all(runners);
return out;
}
function chunkArray(arr,size){var chunks=[];for(var i=0;i<arr.length;i+=size)chunks.push(arr.slice(i,i+size));return chunks;}
function buildSharedSpendRows(a,rows,date){
var combo={};
(rows||[]).forEach(function(c){var spend=Math.round(parseFloat(c.spend||0));if(!spend)return;
var parts=(c.campaign_name||'').split('_'),sp=(parts[0]||'').trim(),cp=(parts[2]||'').trim();
var spLower=sp.toLowerCase(),cpLower=cp.toLowerCase();
var ms2=allStaff.find(function(s){return s.campaign_keyword&&spLower===s.campaign_keyword.toLowerCase();});
var mc=clientList.find(function(cl){return cl.campaign_keyword&&cpLower.indexOf(cl.campaign_keyword.toLowerCase())>=0;});
if(ms2){var key=ms2.id+'|'+(mc?mc.id:'');if(!combo[key])combo[key]={ad_account_id:a.id,report_date:date,spend_amount:0,staff_id:ms2.id,matched_client_id:mc?mc.id:null};combo[key].spend_amount+=spend;}
});
return Object.keys(combo).map(function(k){return combo[k];});
}
async function fetchSharedSpendRowsBatch(shared,date){
var rows=[],errors=0;
for(var b=0;b<shared.length;b+=50){
var chunk=shared.slice(b,b+50);
var batchReqs=chunk.map(function(a){return{method:'GET',relative_url:a.fb_account_id+'/insights?level=campaign&fields=campaign_name,spend&time_range={"since":"'+date+'","until":"'+date+'"}&limit=500'};});
try{
var bResp=await fetch('https://graph.facebook.com/v25.0/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'batch='+encodeURIComponent(JSON.stringify(batchReqs))+'&access_token='+META_TOKEN+'&include_headers=false'});
var bResults=await bResp.json();
for(var j=0;j<chunk.length;j++){
try{
var body=JSON.parse((bResults[j]&&bResults[j].body)||'{}');
if(body.error){errors++;continue;}
rows=rows.concat(buildSharedSpendRows(chunk[j],body.data||[],date));

}

}

function parseMessRows(a,campBody,insBody){

(campBody.data||[]).forEach(function(c){activeIds.add(c.id);});
return (insBody.data||[]).map(function(r){

if(act.action_type&&(act.action_type.indexOf('messaging_conversation_started')>=0||act.action_type==='onsite_conversion.messaging_conversation_started_7d'))messCount+=parseInt(act.value)||0;

});}
return{ad_account_id:a.id,campaign_id:r.campaign_id,campaign_name:r.campaign_name,report_date:r.date_start,spend:spend,mess_count:messCount,lead_count:leadCount,campaign_status:activeIds.has(r.campaign_id)?'ACTIVE':'PAUSED'};
});

async function loadMetaAccounts(force,silent){
if(!force&&metaAccounts.length)return;
try{
var all=[],url='https://graph.facebook.com/v25.0/me/adaccounts?fields=id,name,account_status&limit=100&access_token='+META_TOKEN;
while(url){
var resp=await fetch(url),data=await resp.json();
if(data.error){if(!silent)toast('Meta API lỗi: '+data.error.message,false);return;}
all=all.concat(data.data||[]);
url=data.paging&&data.paging.next?data.paging.next:null;
}
var detailed=[];
for(var b=0;b<all.length;b+=50){
var chunk=all.slice(b,b+50);
var batchReqs=chunk.map(function(a){return{method:'GET',relative_url:a.id+'?fields=id,name,account_status,spend_cap,amount_spent'};});
try{
var bResp=await fetch('https://graph.facebook.com/v25.0/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'batch='+encodeURIComponent(JSON.stringify(batchReqs))+'&access_token='+META_TOKEN+'&include_headers=false'});
var bResults=await bResp.json();
for(var j=0;j<chunk.length;j++){
try{var body=JSON.parse((bResults[j]&&bResults[j].body)||'{}');
if(!body.error&&body.id)detailed.push(body);else detailed.push(chunk[j]);
}catch(e2){detailed.push(chunk[j]);}
}
}catch(e){for(var k=0;k<chunk.length;k++)detailed.push(chunk[k]);}
}
metaAccounts=detailed;
}catch(e){if(!silent)toast('Lỗi: '+e.message,false);}
}
async function loadMetaAndSync(opts){
opts=opts||{};
var silent=!!opts.silent,skipAuth=!!opts.skipAuth,refreshAfter=opts.refreshAfter!==false;
if(skipAuth){if(!authUser)return{ok:false,reason:'auth'};}
else if(!needAuth())return{ok:false,reason:'auth'};
await loadMetaAccounts(true,silent);if(!metaAccounts.length)return{ok:false,reason:'empty'};
var seen=new Set();var uniqueMeta=metaAccounts.filter(function(m){if(seen.has(m.id))return false;seen.add(m.id);return true;});
var existFb=new Set();adList.forEach(function(a){if(a.fb_account_id)existFb.add(a.fb_account_id);});
var ph=clientList.find(function(c){return c.name==='Chưa phân loại';});var phId;
if(ph){phId=ph.id;}else{var{data:nc,error}=await sb2.from('client').insert({name:'Chưa phân loại',status:'active'}).select('id').single();if(error){if(!silent)toast('Lỗi',false);return{ok:false,reason:'placeholder'};}phId=nc.id;}
var imp=0,capOnlyCount=0;
var newAccounts=uniqueMeta.filter(function(m){return!existFb.has(m.id);});
if(newAccounts.length){
var insertRows=newAccounts.map(function(m){existFb.add(m.id);imp++;return{client_id:phId,account_name:m.name,fb_account_id:m.id,account_status:m.account_status};});
var insertBatches=chunkArray(insertRows,200);
for(var ib=0;ib<insertBatches.length;ib++){await sb2.from('ad_account').insert(insertBatches[ib]);}}
var updateItems=uniqueMeta.map(function(m2){var spendCap=metaNum(m2.spend_cap),amountSpent=metaNum(m2.amount_spent);if(spendCap&&amountSpent>spendCap)capOnlyCount++;return{id:m2.id,data:{account_name:m2.name,account_status:m2.account_status,spend_cap:spendCap,amount_spent:amountSpent}};});
await runLimited(updateItems,15,async function(item){await sb2.from('ad_account').update(item.data).eq('fb_account_id',item.id);});
if(!silent)toast((imp?'Nhập '+imp+' TK mới + ':'')+'Đã cập nhật Meta'+(capOnlyCount?' · '+capOnlyCount+' TK chỉ đồng bộ được ngưỡng':''),true);
if(refreshAfter)await loadAll();
return{ok:true,imported:imp,capOnlyCount:capOnlyCount};}

function getDataSummary(){
var cm=lm();var nd=dates.filter(function(d){return d.substring(0,7)===cm;}).length||1;
var dim=new Date(parseInt(cm.split('-')[0]),parseInt(cm.split('-')[1]),0).getDate();
// Staff spend
var st={};staffList.forEach(function(s){st[s.id]={name:s.short_name,budget:s.monthly_budget,spend:0};});
dailyData.filter(function(d){return d.report_date.substring(0,7)===cm;}).forEach(function(d){
var sid=gsfa(d.ad_account_id,d.report_date,d.staff_id);if(sid&&st[sid])st[sid].spend+=d.spend_amount;});
// Client spend
var cs={};clientList.forEach(function(c){cs[c.id]={name:c.name,fee:getEffectiveServiceFee(c.id,cm,c.service_fee),payment:c.payment_status,status:c.status,spend:0,tkCount:0};});
adList.forEach(function(a){if(a.client_id&&cs[a.client_id])cs[a.client_id].tkCount++;});
dailyData.filter(function(d){return d.report_date.substring(0,7)===cm;}).forEach(function(d){
var cid=d.matched_client_id||null;
if(!cid){var aa=adList.find(function(a){return a.id===d.ad_account_id;});if(aa){var asg=getAssign(d.ad_account_id,d.report_date);cid=asg.length?asg[0].client_id:aa.client_id;}}
if(cid&&cs[cid])cs[cid].spend+=d.spend_amount;});
// Ad accounts with comparable spend-cap usage
var tkAlerts=[];adList.forEach(function(a){if(hasComparableSpendCap(a)){var pct=Math.round(a.amount_spent/a.spend_cap*100);if(pct>=80)tkAlerts.push({name:a.account_name,spent:a.amount_spent,cap:a.spend_cap,pct:pct});}});
// Finance
var inc=0,exp=0;txnData.forEach(function(t){if(t.month===cm){if(t.txn_type==='income')inc+=t.amount;else exp+=t.amount;}});
var summary='Dữ liệu HC Agency — T'+parseInt(cm.split('-')[1])+'/'+cm.split('-')[0]+' ('+nd+' ngày có data, tháng '+dim+' ngày):\n';
summary+='\n== NHÂN SỰ ==\n';
Object.keys(st).forEach(function(id){var s=st[id];summary+=s.name+': chi '+ff(s.spend)+', ngân sách '+ff(s.budget)+', đạt '+Math.round(s.spend/(s.budget||1)*100)+'%, TB/ngày '+ff(Math.round(s.spend/nd))+'\n';});
summary+='\n== KHÁCH HÀNG ('+clientList.length+') ==\n';
var cArr=Object.keys(cs).map(function(id){return cs[id];}).sort(function(a,b){return b.spend-a.spend;});
cArr.forEach(function(c){if(c.spend>0||c.fee>0)summary+=c.name+': chi tiêu '+ff(c.spend)+', phí DV '+ff(c.fee)+', TT: '+(c.payment==='paid'?'đã':'chưa')+', '+c.tkCount+' TK, '+c.status+'\n';});
if(tkAlerts.length){summary+='\n== CẢNH BÁO NGÂN SÁCH TK ==\n';tkAlerts.sort(function(a,b){return b.pct-a.pct;}).forEach(function(a){summary+=a.name+': đã chi '+ff(a.spent)+'/'+ff(a.cap)+' ('+a.pct+'%)\n';});}
summary+='\n== TÀI CHÍNH ==\nDoanh thu phí DV: '+ff(inc)+'\nChi phí (lương+VH): '+ff(exp)+'\nLợi nhuận: '+ff(inc-exp)+'\n';
summary+='Tổng TK: '+adList.length+' ('+adList.filter(function(a){return a.account_status===1;}).length+' hoạt động)\n';
var messAlerts=getMessAlerts(),leadAlerts=getLeadAlerts();
if(messAlerts.length){summary+='\n== CẢNH BÁO GIÁ MESS (TB 4 ngày) ==\n';
messAlerts.forEach(function(al){summary+=al.campaign_name+' ('+al.client_name+'): giá mess '+ff(al.cost_per_mess)+'đ, ngưỡng '+ff(al.max_cost)+'đ, NV '+(al.staff?al.staff.short_name:'—')+', spend 4 ngày '+ff(al.spend_4d)+', '+al.mess_4d+' mess\n';});}
else{summary+='\n== GIÁ MESS ==\nKhông có chiến dịch nào vượt ngưỡng giá mess.\n';}
if(leadAlerts.length){summary+='\n== CẢNH BÁO GIÁ FORM (TB 4 ngày) ==\n';
leadAlerts.forEach(function(al){summary+=al.campaign_name+' ('+al.client_name+'): giá form '+ff(al.cost_per_lead)+'đ, ngưỡng '+ff(al.max_cost)+'đ, NV '+(al.staff?al.staff.short_name:'—')+', spend 4 ngày '+ff(al.spend_4d)+', '+al.leads_4d+' form\n';});}
else{summary+='\n== GIÁ FORM ==\nKhông có chiến dịch nào vượt ngưỡng giá form.\n';}
return summary;}

async function callGPT(userMsg){
var systemPrompt='Bạn là trợ lý phân tích quảng cáo của HC Agency. Trả lời bằng tiếng Việt, ngắn gọn, dùng emoji cho dễ đọc. Khi phân tích, hãy đưa ra nhận xét cụ thể, số liệu rõ ràng, và gợi ý hành động. Dữ liệu hiện tại:\n\n'+getDataSummary();
if(!aiMessages.length){aiMessages=[{role:'system',content:systemPrompt}];}
aiMessages.push({role:'user',content:userMsg});
var model=getAIModel();
try{
if(isClaude(model)){
// Anthropic Claude API
var claudeMsgs=aiMessages.filter(function(m){return m.role!=='system';});
var resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':CLAUDE_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:model,system:systemPrompt,messages:claudeMsgs,max_tokens:1500})});
var data=await resp.json();
if(data.error){
if(JSON.stringify(data.error).indexOf('api_key')>=0||JSON.stringify(data.error).indexOf('auth')>=0){localStorage.removeItem('hc_claude_key');CLAUDE_KEY='';}
return'⚠ Lỗi: '+(data.error.message||JSON.stringify(data.error));}
var reply=data.content[0].text;
aiMessages.push({role:'assistant',content:reply});
return reply;
}else{
// OpenAI API
var resp=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+OPENAI_KEY},body:JSON.stringify({model:model,messages:aiMessages,max_tokens:1500,temperature:0.7})});
var data=await resp.json();
if(data.error){
if(data.error.message&&data.error.message.indexOf('API key')>=0){localStorage.removeItem('hc_openai_key');OPENAI_KEY='';}
return'⚠ Lỗi: '+data.error.message;}
var reply=data.choices[0].message.content;
aiMessages.push({role:'assistant',content:reply});
return reply;
}
}catch(e){return'⚠ Lỗi kết nối: '+e.message;}}

return esc(text).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>').replace(/• /g,'<span style="color:var(--teal);">•</span> ');}

function showSyncBar(msg,done){var bar=document.getElementById('sync-bar');var txt=document.getElementById('sync-text');if(!bar)return;bar.classList.remove('hidden');if(done)bar.classList.add('done');else bar.classList.remove('done');txt.textContent=msg;}

async function syncOneDate(date,mapped){
var normal=mapped.filter(function(a){return!a.is_shared;});
var shared=mapped.filter(function(a){return a.is_shared;});
var saved=0,errors=0;
// Batch 50 TK thường
for(var b=0;b<normal.length;b+=50){
var chunk=normal.slice(b,b+50);
var batchReqs=chunk.map(function(a){return{method:'GET',relative_url:a.fb_account_id+'/insights?fields=spend&time_range={"since":"'+date+'","until":"'+date+'"}'};});
try{
var bResp=await fetch('https://graph.facebook.com/v25.0/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'batch='+encodeURIComponent(JSON.stringify(batchReqs))+'&access_token='+META_TOKEN+'&include_headers=false'});
var bResults=await bResp.json();
var upsertRows=[];
for(var j=0;j<bResults.length;j++){
try{var body=JSON.parse(bResults[j].body||'{}');
var spend=0;if(body.data&&body.data.length)spend=Math.round(parseFloat(body.data[0].spend));
upsertRows.push({ad_account_id:chunk[j].id,report_date:date,spend_amount:spend});
}catch(e){errors++;}}
if(upsertRows.length){
await sb2.from('daily_spend').delete().in('ad_account_id',upsertRows.map(function(r){return r.ad_account_id;})).eq('report_date',date).is('staff_id',null);
var ubatches=chunkArray(upsertRows,200);
for(var ub=0;ub<ubatches.length;ub++){var ur=await sb2.from('daily_spend').insert(ubatches[ub]);if(!ur.error)saved+=ubatches[ub].length;else errors+=ubatches[ub].length;}}
}catch(e){errors+=chunk.length;}}
// TK dùng chung: batch Meta API + insert DB theo lô
var sharedResult=await replaceSharedSpendRows(shared,date);
saved+=sharedResult.saved;errors+=sharedResult.errors;
return{saved:saved,errors:errors};}

async function autoSync(){
try{
if(authUser){
showSyncBar('Đang cập nhật Meta...');
await loadMetaAndSync({silent:true,skipAuth:true,refreshAfter:false});
}
var mapped=adList.filter(function(a){return a.fb_account_id;});
if(!mapped.length){
console.log('[AutoSync] No mapped accounts');
if(authUser){showSyncBar('✓ Đã cập nhật Meta',true);setTimeout(hideSyncBar,1800);}
return;
}
var today=td();
var yest=yesterday();
showSyncBar('Đang đồng bộ spend hôm qua + hôm nay...');
var results=await Promise.all([syncOneDate(yest,mapped),syncOneDate(today,mapped)]);
var r1=results[0],r2=results[1];
var totalSaved=r1.saved+r2.saved,totalErrors=r1.errors+r2.errors;
showSyncBar('Đang quét giá mess chiến dịch...');
await syncCampaignMess(null,true);
showSyncBar('✓ Đồng bộ xong: '+totalSaved+' OK'+(totalErrors?', '+totalErrors+' lỗi':''),true);
await loadAll();
setTimeout(hideSyncBar,3000);
}catch(e){showSyncBar('⚠ Lỗi đồng bộ: '+e.message);setTimeout(hideSyncBar,5000);}}
