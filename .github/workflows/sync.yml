name: HC Agency - Realtime Sync

on:
  schedule:
    # Mỗi 15 phút: sync chi tiêu + mess/comment/checkout của HÔM NAY (D0)
    # Đảm bảo báo cáo khách thấy data realtime trong vòng 15 phút.
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Cho phép chạy thủ công từ GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    # Tránh job chồng job nếu lần trước chạy chưa xong
    concurrency:
      group: hc-sync
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Run sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: node scripts/sync.js
