<button class="ai-fab" onclick="toggleAI()" title="HC AI"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>HC AI</button>
<div class="ai-panel" id="ai-panel">
<div class="ai-header"><div class="ai-header-info"><div class="ai-avatar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="var(--bg2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div><div style="font-weight:500;font-size:14px;color:var(--tx1);">HC Agency AI</div><select id="ai-model" onchange="onModelChange()" style="background:none;border:none;font-size:11px;color:var(--tx3);font-family:inherit;cursor:pointer;padding:0;"><optgroup label="OpenAI"><option value="gpt-5.4-nano">GPT-5.4 Nano (rẻ nhất)</option><option value="gpt-5.4-mini" selected>GPT-5.4 Mini (khuyên dùng)</option><option value="gpt-5.4">GPT-5.4 (cao cấp)</option></optgroup><optgroup label="Anthropic Claude"><option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option><option value="claude-sonnet-4-6">Claude Sonnet 4.6</option></optgroup></select></div></div><div style="display:flex;gap:8px;align-items:center;"><div style="width:6px;height:6px;border-radius:50%;background:var(--green);"></div><button type="button" aria-label="Đóng HC AI" onclick="toggleAI()" style="font-size:20px;color:var(--tx3);cursor:pointer;line-height:1;background:none;border:0;padding:0;">×</button></div></div>
<div class="ai-msgs" id="ai-msgs"></div>
<div class="ai-input-bar"><input type="text" id="ai-input" placeholder="Hỏi thêm..." onkeydown="if(event.key==='Enter')sendAI()"><button class="ai-send" id="ai-send-btn" onclick="sendAI()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="var(--bg2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>
<div class="ai-quick"><button class="ai-qbtn" onclick="askAI('Khách hàng nào sắp hết ngân sách?')">Sắp hết ngân sách?</button><button class="ai-qbtn" onclick="askAI('Ai chưa thanh toán phí Dịch vụ?')">Chưa thanh toán?</button><button class="ai-qbtn" onclick="askAI('So sánh hiệu suất nhân viên')">So sánh Nhân sự</button><button class="ai-qbtn" onclick="askAI('Dự báo chi tiêu cuối tháng')">Dự báo</button><button class="ai-qbtn" onclick="resetAIKey()" style="color:var(--red);">Đổi API key</button></div>
</div>
<button type="button" id="theme-toggle-btn" class="theme-fab" onclick="hcToggleTheme()" aria-label="Chuyển chế độ sáng/tối" title="Chế độ tối (Ctrl+Shift+D)">
<svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
<svg class="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.6"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
</button>
<div id="sync-bar" class="sync-bar hidden" role="status" aria-live="polite"><div class="spin" aria-hidden="true"></div><span id="sync-text">Đang đồng bộ...</span></div>
<div id="toast-container"></div>
