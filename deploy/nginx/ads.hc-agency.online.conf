server {
    listen 80;
    server_name ads.hc-agency.online;

    root /var/www/ads.hc-agency.online;
    index quang-cao-facebook-vinsmart-city.html;

    client_max_body_size 10M;

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        try_files /quang-cao-facebook-vinsmart-city.html =404;
    }

    location = /robots.txt {
        default_type text/plain;
        try_files /robots.txt =404;
    }

    location = /sitemap.xml {
        default_type application/xml;
        try_files /sitemap.xml =404;
    }

    location / {
        try_files $uri $uri/ /quang-cao-facebook-vinsmart-city.html;
    }

    location ~* \.(?:jpg|jpeg|png|gif|webp|svg|ico|mp4|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}
