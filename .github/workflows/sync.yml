name: HC Agency - Realtime Sync

on:
  schedule:
    # Mỗi 15 phút: sync chi tiêu + mess/comment/checkout của HÔM NAY (D0)
    # Đảm bảo báo cáo khách thấy data realtime trong vòng 15 phút.
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Chạy thủ công từ GitHub Actions tab. Có thể truyền range để backfill.
    inputs:
      backfill_from:
        description: 'Backfill từ ngày (YYYY-MM-DD). Để trống = chỉ D0.'
        required: false
        default: ''
      backfill_to:
        description: 'Backfill đến ngày (YYYY-MM-DD). Để trống = đến hôm nay.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    # Tránh job chồng job nếu lần trước chạy chưa xong
    concurrency:
      group: hc-sync
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'  # Node 22+ có fetch/WebSocket native cho cron sync

      - name: Install dependencies
        run: npm install   # đọc package.json (pin được version)

      - name: Run sync
        env:
          LOCAL_DB_URL: ${{ secrets.LOCAL_DB_URL }}
          LOCAL_DB_SERVICE_KEY: ${{ secrets.LOCAL_DB_SERVICE_KEY }}
          META_TOKEN: ${{ secrets.META_TOKEN }}
          BACKFILL_FROM: ${{ github.event.inputs.backfill_from }}
          BACKFILL_TO: ${{ github.event.inputs.backfill_to }}
        run: node scripts/sync.js
